# Configuration for Column Comments Enrichment Mission
# Edit this file before each run to specify the target table and reference materials.
#
# Alation: Entitlement Bill - Analytical Data Set (id=6623325)
# Description: Analytic Dataset (ADS) that provides a comprehensive view of a renewals of purchase Godaddy orders.

# Target table location in the data lake registry
target:
  # Database name (e.g., "analytic", "customer360", "ecomm-cln")
  db_name: "bi-reports"
  # Table name (e.g., "ads-bill-line", "cdl-current")
  table_name: "ads-entitlement-bill"
  # Registry path variant: "standard" or "dlms-api"
  #   standard: catalog/config/prod/us-west-2/<db-name>/<table-name>/
  #   dlms-api: catalog/config/prod/dlms-api/us-west-2/<db-name>/<table-name>/
  registry_path: "standard"

# Confluence pages for table requirements and design specifications.
# Sourced from the Alation table description; verify each URL before running.
confluence_pages:
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3958898790/ads_entitlement_bill+validation+summary+after+switch+to+eds+lookalike+table"
    description: "ads_entitlement_bill validation summary after switch to EDS lookalike table — documents column-level validation and row-count parity vs the EDS Prime lookalike"

# Successor/related tables whose column descriptions provide relevant context.
# The agent looks these up in Alation to extract existing column descriptions.
reference_tables:
  - name: "fact_bill_line"
    schema: "enterprise"
    alation_table_id: 6332236
    description: "Upstream dependency from data lake registry lineage — enterprise.fact_bill_line: Enterprise Dataset (EDS) that provides a comprehensive view of a receipt for the purchase of GoDaddy products."
  - name: "dim_entitlement"
    schema: "enterprise"
    alation_table_id: 6229554
    description: "Upstream dependency from data lake registry lineage — enterprise.dim_entitlement: Entitlement information of customers products"
  - name: "dim_subscription"
    schema: "enterprise"
    alation_table_id: 6229558
    description: "Upstream dependency from data lake registry lineage — enterprise.dim_subscription: A comprehensive view of dimensions and metrics associated with purchased products"
  - name: "customer_type"
    schema: "analytic_feature"
    alation_table_id: 6304551
    description: "Upstream dependency from data lake registry lineage — analytic_feature.customer_type: migrated-customer_type"
  - name: "dim_product_history_vw"
    schema: "finance360"
    alation_table_id: 7021957
    description: "Upstream dependency from data lake registry lineage — finance360.dim_product_history_vw: SCD2 Conformed Dimension table containing product-level reporting attributes."
  - name: "dim_reseller_vw"
    schema: "partner360"
