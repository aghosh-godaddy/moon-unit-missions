    alation_table_id: 6295886
    description: "Upstream dependency from data lake registry lineage — analytic_feature.shopper_crm_portfolio: Stores Shoppers and their CRM Portfolio features by evaluation date"
  - name: "dim_new_acquisition_shopper"
