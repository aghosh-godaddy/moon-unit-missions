# Configuration for Column Comments Enrichment Mission
# Edit this file before each run to specify the target table and reference materials.
#
# Alation: Fact Entitlement Bill (id=6607221)
# Description: Enterprise Dataset (EDS) that provides a comprehensive view of a renewals of purchase Godaddy orders.

# Target table location in the data lake registry
target:
  # Database name (e.g., "analytic", "customer360", "ecomm-cln")
  db_name: "enterprise"
  # Table name (e.g., "ads-bill-line", "cdl-current")
  table_name: "fact-entitlement-bill"
  # Registry path variant: "standard" or "dlms-api"
  #   standard: catalog/config/prod/us-west-2/<db-name>/<table-name>/
  #   dlms-api: catalog/config/prod/dlms-api/us-west-2/<db-name>/<table-name>/
  registry_path: "standard"

# Confluence pages for table requirements and design specifications.
# Sourced from the Alation table description; verify each URL before running.
confluence_pages:
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3941171221/fact_entitlement_bill+Validation+switch+to+lookalike+prime"
    description: "fact_entitlement_bill Validation — column-level match rates vs EDS Prime lookalike (26 years of data, 2025-09 snapshot)"

# Successor/related tables whose column descriptions provide relevant context.
# The agent looks these up in Alation to extract existing column descriptions.
reference_tables:
  - name: "nds_resource_auto_renew_delta"
    schema: "ecomm_mart"
    alation_table_id: 6837294
    description: "Upstream dependency from data lake registry lineage — ecomm_mart.nds_resource_auto_renew_delta: Conversion of nds_resource_auto_renew to Delta Lake"
  - name: "dim_entitlement"
    schema: "enterprise"
    alation_table_id: 6229554
    description: "Upstream dependency from data lake registry lineage — enterprise.dim_entitlement: Entitlement information of customers products"
  - name: "dim_subscription"
    schema: "enterprise"
    alation_table_id: 6229558
    description: "Upstream dependency from data lake registry lineage — enterprise.dim_subscription: A comprehensive view of dimensions and metrics associated with purchased products"
  - name: "fact_bill_line_vw"
    schema: "ecomm360"
    alation_table_id: 7027689
    description: "Upstream dependency from data lake registry lineage — ecomm360.fact_bill_line_vw: tracks every receipt of the purchase of a godaddy customer."

# Alation configuration (optional — enriches descriptions with catalog metadata).
# Credentials (user_id, refresh_token, URL) are loaded from .env.
alation:
  enabled: true
  # Table search query (defaults to db_name.table_name if not set)
  search_query: null
