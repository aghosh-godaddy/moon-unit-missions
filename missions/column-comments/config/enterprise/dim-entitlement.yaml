# Configuration for Column Comments Enrichment Mission
# Edit this file before each run to specify the target table and reference materials.
#
# Alation: Entitlement Dimension (id=6229554)
# Description: Entitlement information of customers products

# Target table location in the data lake registry
target:
  # Database name (e.g., "analytic", "customer360", "ecomm-cln")
  db_name: "enterprise"
  # Table name (e.g., "ads-bill-line", "cdl-current")
  table_name: "dim-entitlement"
  # Registry path variant: "standard" or "dlms-api"
  #   standard: catalog/config/prod/us-west-2/<db-name>/<table-name>/
  #   dlms-api: catalog/config/prod/dlms-api/us-west-2/<db-name>/<table-name>/
  registry_path: "standard"
# NOTE: Being replaced by ecomm360.dim_subscription, dim_subscription_product, dim_subscription_addon

# Confluence pages for table requirements and design specifications.
# Sourced from the Alation table description; verify each URL before running.
confluence_pages:
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/76447948/dim_subscription+and+entitlement"
    description: "dim_subscription and entitlement — overview of the Subscription/Entitlement table pair, SLAs, partition column, PK, and contacts"
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/4323412165/dim_entitlement+Validation+switch+to+lookalike+prime"
    description: "dim_entitlement Validation — column-level match rates vs EDS Prime lookalike (2026-03 snapshot)"

# Successor/related tables whose column descriptions provide relevant context.
# The agent looks these up in Alation to extract existing column descriptions.
reference_tables:
  - name: "fact_bill_line"
    schema: "enterprise"
    alation_table_id: 6332236
    description: "Upstream dependency from data lake registry lineage — enterprise.fact_bill_line: Enterprise Dataset (EDS) that provides a comprehensive view of a receipt for the purchase of GoDaddy products."
  - name: "dim_subscription"
    schema: "enterprise"
    alation_table_id: 6229558
    description: "Upstream dependency from data lake registry lineage — enterprise.dim_subscription: A comprehensive view of dimensions and metrics associated with purchased products"
  - name: "dim_customer_history_vw"
    schema: "customer360"
    alation_table_id: 7022324
    description: "Upstream dependency from data lake registry lineage — customer360.dim_customer_history_vw: shopper and profile data in customer360"

# Alation configuration (optional — enriches descriptions with catalog metadata).
# Credentials (user_id, refresh_token, URL) are loaded from .env.
alation:
  enabled: true
  # Table search query (defaults to db_name.table_name if not set)
  search_query: null
