# Configuration for Column Comments Enrichment Mission
# Edit this file before each run to specify the target table and reference materials.

# Target table location in the data lake registry
target:
  # Database name (e.g., "analytic", "customer360", "ecomm-cln")
  db_name: "customer360"
  # Table name (e.g., "ads-bill-line", "cdl-current")
  table_name: "customer-metric-daily-agg-vw"
  # Registry path variant: "standard" or "dlms-api"
  #   standard: catalog/config/prod/us-west-2/<db-name>/<table-name>/
  #   dlms-api: catalog/config/prod/dlms-api/us-west-2/<db-name>/<table-name>/
  registry_path: "dlms-api"

# Confluence pages for table requirements and design specifications
# Add as many pages as needed — the agent will read all of them for context.
confluence_pages:
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3970861345/Customer+Lifecycle"
    description: "Customer Lifecycle design — lifecycle stages, transitions, and business logic underlying the daily aggregated customer metrics"
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3779199819/Customer360"
    description: "Customer360 design specification — overall Customer360 schema architecture and column definitions"

# Successor/related tables whose column descriptions provide relevant context.
# The agent looks these up in Alation to extract existing column descriptions.
reference_tables:
  - name: "customer_life_cycle_vw"
    schema: "customer360"
    alation_table_id: 7038345
    description: "Upstream dependency from data lake registry lineage — customer360.customer_life_cycle_vw: Analytic Dataset for Customer Life Cycle. Source of customer metrics aggregated daily into this view."

# Alation configuration (optional — enriches descriptions with catalog metadata)
# Alation credentials (user_id, refresh_token, URL) are loaded from .env
alation:
  enabled: true
  # Table search query (defaults to db_name.table_name if not set)
  search_query: null
