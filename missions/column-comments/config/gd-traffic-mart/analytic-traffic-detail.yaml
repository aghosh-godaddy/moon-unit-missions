# Configuration for Column Comments Enrichment Mission
# Edit this file before each run to specify the target table and reference materials.
#
# Alation: Analytic Traffic Detail (id=6951066)
# Description: Analytic Dataset for CSP Traffic Session and Order Data

# Target table location in the data lake registry
target:
  # Database name (e.g., "analytic", "customer360", "ecomm-cln")
  db_name: "gd-traffic-mart"
  # Table name (e.g., "ads-bill-line", "cdl-current")
  table_name: "analytic-traffic-detail"
  # Registry path variant: "standard" or "dlms-api"
  #   standard: catalog/config/prod/us-west-2/<db-name>/<table-name>/
  #   dlms-api: catalog/config/prod/dlms-api/us-west-2/<db-name>/<table-name>/
  registry_path: "standard"

# Confluence pages for table requirements and design specifications.
# Sourced from the Alation table description; verify each URL before running.
confluence_pages:
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3510968264/MDPE+-+Traffic+Data+Consumer+Responsibilities"
    description: "MDPE - Traffic Data Consumer Responsibilities — linked from Alation table description"
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3318415585/MDPE+-+WAD+v2+Design"
    description: "MDPE - WAD v2 Design — linked from Alation table description"
  - url: "https://godaddy-corp.atlassian.net/wiki/spaces/BI/pages/3318415788/MDPE+-+CSP+Traffic+EDS+Design"
    description: "MDPE - CSP Traffic EDS Design — linked from Alation table description"

# Successor/related tables whose column descriptions provide relevant context.
# The agent looks these up in Alation to extract existing column descriptions.
reference_tables:
  - name: "traffic_session"
    schema: "gd_traffic_mart"
    alation_table_id: 6951082
    description: "Upstream dependency from data lake registry lineage — gd_traffic_mart.traffic_session: CSP Traffic session level data. Tier3 DATAGOVER-1503"
  - name: "ads_bill_line"
    schema: "analytic"
    alation_table_id: 6242622
    description: "Upstream dependency from data lake registry lineage — analytic.ads_bill_line: analytic data set for bill line"
  - name: "gd_bill_id_session_xref"
    schema: "gd_traffic_mart"
    alation_table_id: 6636558
    description: "Upstream dependency from data lake registry lineage — gd_traffic_mart.gd_bill_id_session_xref: Mapping table between Orders (bill_id) and Traffic (session_id)"
  - name: "gd_traffic_session_last_nondirect_attribution"
    schema: "gd_traffic_mart"
    alation_table_id: 6622545
    description: "Upstream dependency from data lake registry lineage — gd_traffic_mart.gd_traffic_session_last_nondirect_attribution: Session level last non-direct attribution channel using GoDaddy traffic data. Tier3 DATAGOVER-1504"
  - name: "shopper_tenure"
    schema: "analytic_feature"
    alation_table_id: 6300179
    description: "Upstream dependency from data lake registry lineage — analytic_feature.shopper_tenure: migrated-hive-shopper_tenure"
  - name: "customer_type"
    schema: "analytic_feature"
    alation_table_id: 6304551
