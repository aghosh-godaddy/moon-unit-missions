<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Comments Enrichment · Sequence</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --color-link:    #2e5aa8;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Sequence · Moon Units</p>
    <h1>Mission execution flow</h1>

    <svg viewBox="0 0 1040 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Actor boxes -->
      <!-- User -->
      <rect x="52" y="28" width="96" height="40" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="100" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User</text>

      <!-- run.sh -->
      <rect x="208" y="28" width="96" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="256" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">run.sh</text>

      <!-- mu CLI -->
      <rect x="380" y="28" width="96" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="428" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">mu</text>

      <!-- Agent (Claude) - FOCAL -->
      <rect x="548" y="28" width="96" height="40" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="596" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Agent</text>

      <!-- External APIs -->
      <rect x="760" y="28" width="120" height="40" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="820" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">External APIs</text>

      <!-- Lifelines -->
      <line x1="100" y1="68" x2="100" y2="740" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="256" y1="68" x2="256" y2="740" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="428" y1="68" x2="428" y2="740" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="596" y1="68" x2="596" y2="740" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="820" y1="68" x2="820" y2="740" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Activation bars -->
      <rect x="252" y="96" width="8" height="636" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="424" y="176" width="8" height="528" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="592" y="236" width="8" height="448" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="0.8"/>

      <!-- 1. User → run.sh: ./run.sh -->
      <line x1="100" y1="100" x2="248" y2="100" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="140" y="84" width="52" height="12" rx="2" fill="#f5f5f5"/>
      <text x="166" y="94" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">./RUN.SH</text>

      <!-- 2. run.sh self: mu lint pre-flight -->
      <path d="M 260 128 C 300 128, 300 148, 260 148" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="300" y="128" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="328" y="138" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MU LINT</text>

      <!-- 3. run.sh → mu: mu launch --mount-workspace -->
      <line x1="264" y1="184" x2="420" y2="184" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="280" y="168" width="124" height="12" rx="2" fill="#f5f5f5"/>
      <text x="342" y="178" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MU LAUNCH + MOUNT-WS</text>

      <!-- 4. mu self: bootstrap + clone -->
      <path d="M 432 212 C 472 212, 472 232, 432 232" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="440" y="212" width="72" height="12" rx="2" fill="#f5f5f5"/>
      <text x="476" y="222" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">BOOTSTRAP</text>

      <!-- SNAPSHOT 1: original-table.ddl (on run.sh lifeline, as a visible dot) -->
      <circle cx="256" cy="260" r="5" fill="#eb6c36" stroke="#f5f5f5" stroke-width="1.2"/>
      <rect x="100" y="252" width="140" height="12" rx="2" fill="#f5f5f5"/>
      <text x="170" y="262" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SNAPSHOT: ORIGINAL</text>

      <!-- 5. mu → agent: start research -->
      <line x1="432" y1="288" x2="588" y2="288" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="468" y="272" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="508" y="282" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">RESEARCH</text>

      <!-- 6. Agent → External: multi-source fetch (DDL / Confluence / Alation / Dictionary) -->
      <line x1="600" y1="324" x2="816" y2="324" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="648" y="308" width="124" height="12" rx="2" fill="#f5f5f5"/>
      <text x="710" y="318" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DDL + CONFLUENCE + ALATION</text>

      <!-- 7. Agent → External: dictionary lookup -->
      <line x1="600" y1="360" x2="816" y2="360" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="672" y="344" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="710" y="354" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DICTIONARY</text>

      <!-- 8. Agent self: write research.md -->
      <path d="M 600 392 C 640 392, 640 412, 600 412" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="608" y="392" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="646" y="402" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">RESEARCH.MD</text>

      <!-- 9. mu → agent: start enrich -->
      <line x1="432" y1="448" x2="588" y2="448" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="480" y="432" width="52" height="12" rx="2" fill="#f5f5f5"/>
      <text x="506" y="442" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ENRICH</text>

      <!-- 10. Agent self: overwrite table.ddl in repo -->
      <path d="M 600 476 C 640 476, 640 496, 600 496" fill="none" stroke="#eb6c36" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <rect x="608" y="476" width="100" height="12" rx="2" fill="#f5f5f5"/>
      <text x="658" y="486" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">OVERWRITE TABLE.DDL</text>

      <!-- SNAPSHOT 2: enriched-table.ddl on run.sh lifeline -->
      <circle cx="256" cy="520" r="5" fill="#eb6c36" stroke="#f5f5f5" stroke-width="1.2"/>
      <rect x="100" y="512" width="140" height="12" rx="2" fill="#f5f5f5"/>
      <text x="170" y="522" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SNAPSHOT: ENRICHED</text>

      <!-- 11. mu → agent: start validate -->
      <line x1="432" y1="556" x2="588" y2="556" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="476" y="540" width="60" height="12" rx="2" fill="#f5f5f5"/>
      <text x="506" y="550" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">VALIDATE</text>

      <!-- 12. Agent self: condense comments if needed -->
      <path d="M 600 584 C 640 584, 640 604, 600 604" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="608" y="584" width="96" height="12" rx="2" fill="#f5f5f5"/>
      <text x="656" y="594" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">≤ 255 CHARS</text>

      <!-- 13. Agent → mu: done (dashed return) -->
      <line x1="588" y1="632" x2="436" y2="632" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="480" y="616" width="52" height="12" rx="2" fill="#f5f5f5"/>
      <text x="506" y="626" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SUCCESS</text>

      <!-- 14. mu → run.sh: state=SUCCEEDED -->
      <line x1="420" y1="660" x2="264" y2="660" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="300" y="644" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="340" y="654" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">STATE=SUCCEEDED</text>

      <!-- SNAPSHOT 3: validated + generate comparison on run.sh lifeline -->
      <circle cx="256" cy="688" r="5" fill="#eb6c36" stroke="#f5f5f5" stroke-width="1.2"/>
      <rect x="64" y="680" width="176" height="12" rx="2" fill="#f5f5f5"/>
      <text x="152" y="690" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SNAPSHOT: VALIDATED + COMPARE</text>

      <!-- 15. run.sh → user: notify + banner -->
      <line x1="252" y1="720" x2="96" y2="720" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="140" y="704" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="178" y="714" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">BANNER + NOTIFY</text>

      <!-- Legend -->
      <line x1="32" y1="760" x2="1008" y2="760" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="32" y="780" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <line x1="100" y1="776" x2="132" y2="776" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="140" y="780" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Internal call</text>
      <line x1="240" y1="776" x2="272" y2="776" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <text x="280" y="780" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">API call</text>
      <line x1="360" y1="776" x2="392" y2="776" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="400" y="780" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Pipeline stage</text>
      <line x1="520" y1="776" x2="552" y2="776" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="560" y="780" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Return / response</text>
      <circle cx="680" cy="775" r="5" fill="#eb6c36" stroke="#f5f5f5" stroke-width="1.2"/>
      <text x="696" y="780" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Host-side snapshot</text>
    </svg>
  </div>
</body>
</html>
