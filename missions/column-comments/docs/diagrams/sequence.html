<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Comments Enrichment · Sequence</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --color-link:    #2e5aa8;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Sequence · Moon Units</p>
    <h1>Mission execution flow</h1>

    <svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Actor boxes -->
      <!-- User -->
      <rect x="52" y="28" width="96" height="40" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="100" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User</text>

      <!-- run.sh -->
      <rect x="208" y="28" width="96" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="256" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">run.sh</text>

      <!-- mu CLI -->
      <rect x="380" y="28" width="96" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="428" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">mu</text>

      <!-- Agent (Claude) -->
      <rect x="548" y="28" width="96" height="40" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="596" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Agent</text>

      <!-- External APIs -->
      <rect x="760" y="28" width="120" height="40" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="820" y="52" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">External APIs</text>

      <!-- Lifelines -->
      <line x1="100" y1="68" x2="100" y2="660" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="256" y1="68" x2="256" y2="660" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="428" y1="68" x2="428" y2="660" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="596" y1="68" x2="596" y2="660" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="820" y1="68" x2="820" y2="660" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Activation bars -->
      <rect x="252" y="96" width="8" height="556" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="424" y="120" width="8" height="508" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="592" y="196" width="8" height="408" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="0.8"/>

      <!-- Messages -->
      <!-- 1. User → run.sh: ./run.sh -->
      <line x1="100" y1="100" x2="248" y2="100" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="136" y="84" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="164" y="94" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">./RUN.SH</text>

      <!-- 2. run.sh → mu: mu launch -->
      <line x1="260" y1="128" x2="420" y2="128" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="300" y="112" width="68" height="12" rx="2" fill="#f5f5f5"/>
      <text x="334" y="122" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MU LAUNCH</text>

      <!-- 3. mu: bootstrap (self) -->
      <path d="M 432 156 C 468 156, 468 176, 432 176" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="440" y="156" width="68" height="12" rx="2" fill="#f5f5f5"/>
      <text x="474" y="166" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">BOOTSTRAP</text>

      <!-- 4. mu → agent: start research -->
      <line x1="432" y1="200" x2="588" y2="200" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="464" y="184" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="504" y="194" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">RESEARCH</text>

      <!-- 5. Agent → External: clone repo -->
      <line x1="600" y1="240" x2="816" y2="240" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="664" y="224" width="60" height="12" rx="2" fill="#f5f5f5"/>
      <text x="694" y="234" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">READ DDL</text>

      <!-- 6. Agent → External: confluence -->
      <line x1="600" y1="280" x2="816" y2="280" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="656" y="264" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="694" y="274" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CONFLUENCE</text>

      <!-- 7. Agent → External: alation -->
      <line x1="600" y1="320" x2="816" y2="320" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="668" y="304" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="696" y="314" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ALATION</text>

      <!-- 8. Agent → External: dictionary -->
      <line x1="600" y1="360" x2="816" y2="360" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="656" y="344" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="694" y="354" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DICTIONARY</text>

      <!-- 9. Agent writes research.md (self) -->
      <path d="M 600 396 C 636 396, 636 416, 600 416" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="608" y="396" width="76" height="12" rx="2" fill="#f5f5f5"/>
      <text x="646" y="406" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">RESEARCH.MD</text>

      <!-- 10. mu → agent: start enrich -->
      <line x1="432" y1="448" x2="588" y2="448" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="476" y="432" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="504" y="442" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ENRICH</text>

      <!-- 11. Agent → External: GoCode (Claude) -->
      <line x1="600" y1="480" x2="816" y2="480" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <rect x="672" y="464" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="696" y="474" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CLAUDE</text>

      <!-- 12. Agent writes DDL (self) -->
      <path d="M 600 520 C 636 520, 636 540, 600 540" fill="none" stroke="#eb6c36" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <rect x="608" y="520" width="84" height="12" rx="2" fill="#f5f5f5"/>
      <text x="650" y="530" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ENRICHED.DDL</text>

      <!-- 13. Agent → mu: done -->
      <line x1="588" y1="568" x2="436" y2="568" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="480" y="552" width="52" height="12" rx="2" fill="#f5f5f5"/>
      <text x="506" y="562" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SUCCESS</text>

      <!-- 14. mu → run.sh: exit 0 -->
      <line x1="420" y1="596" x2="264" y2="596" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="316" y="580" width="44" height="12" rx="2" fill="#f5f5f5"/>
      <text x="338" y="590" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">EXIT 0</text>

      <!-- 15. run.sh: docker cp + notify -->
      <line x1="252" y1="624" x2="96" y2="624" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="132" y="608" width="64" height="12" rx="2" fill="#f5f5f5"/>
      <text x="164" y="618" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NOTIFY</text>

      <!-- Legend -->
      <line x1="32" y1="680" x2="968" y2="680" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="32" y="700" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <line x1="100" y1="696" x2="132" y2="696" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="140" y="700" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Internal call</text>
      <line x1="240" y1="696" x2="272" y2="696" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
      <text x="280" y="700" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">API call</text>
      <line x1="360" y1="696" x2="392" y2="696" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="400" y="700" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Pipeline stage</text>
      <line x1="520" y1="696" x2="552" y2="696" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="560" y="700" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Return / response</text>
    </svg>
  </div>
</body>
</html>
