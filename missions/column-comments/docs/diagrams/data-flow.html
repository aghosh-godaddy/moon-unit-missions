<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Comments Enrichment · Data Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --color-link:    #2e5aa8;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Data Flow · Moon Units</p>
    <h1>From five sources to enriched DDL</h1>

    <svg viewBox="0 0 1040 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Arrows (drawn first) -->
      <!-- Sources → Research -->
      <line x1="200" y1="80" x2="404" y2="200" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <line x1="200" y1="168" x2="404" y2="216" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <line x1="200" y1="256" x2="404" y2="232" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <line x1="200" y1="344" x2="404" y2="248" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <line x1="200" y1="432" x2="404" y2="264" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

      <!-- Research → research.md -->
      <line x1="576" y1="236" x2="636" y2="236" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- research.md → Enrich -->
      <line x1="768" y1="236" x2="808" y2="236" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <!-- Enrich → Output -->
      <line x1="576" y1="448" x2="636" y2="448" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <!-- research.md → Enrich (vertical) -->
      <line x1="700" y1="268" x2="700" y2="412" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4"/>
      <line x1="700" y1="408" x2="700" y2="420" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Source 1: GitHub DDL -->
      <rect x="32" y="52" width="168" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="32" y="52" width="168" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="40" y="60" width="52" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="66" y="69" fill="rgba(45,49,66,0.60)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SOURCE 1</text>
      <text x="116" y="84" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GitHub Repo</text>
      <text x="116" y="100" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">table.ddl + table.yaml</text>

      <!-- Source 2: Confluence -->
      <rect x="32" y="140" width="168" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="32" y="140" width="168" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="40" y="148" width="52" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="66" y="157" fill="rgba(45,49,66,0.60)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SOURCE 2</text>
      <text x="116" y="172" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confluence</text>
      <text x="116" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">design spec + schema</text>

      <!-- Source 3: Alation Target -->
      <rect x="32" y="228" width="168" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="32" y="228" width="168" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="40" y="236" width="52" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="66" y="245" fill="rgba(45,49,66,0.60)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SOURCE 3</text>
      <text x="116" y="260" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Alation Columns</text>
      <text x="116" y="276" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">column_comment + desc</text>

      <!-- Source 4: Alation Reference -->
      <rect x="32" y="316" width="168" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="32" y="316" width="168" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="40" y="324" width="52" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="66" y="333" fill="rgba(45,49,66,0.60)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SOURCE 4</text>
      <text x="116" y="348" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Reference Table</text>
      <text x="116" y="364" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ecomm360 source comments</text>

      <!-- Source 5: Dictionary -->
      <rect x="32" y="404" width="168" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="32" y="404" width="168" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="40" y="412" width="52" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="66" y="421" fill="rgba(45,49,66,0.60)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SOURCE 5</text>
      <text x="116" y="436" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Data Dictionary</text>
      <text x="116" y="452" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">GCR, NRU, COGS, ...</text>

      <!-- Process: Research (FOCAL) -->
      <rect x="404" y="184" width="172" height="104" rx="6" fill="#f5f5f5"/>
      <rect x="404" y="184" width="172" height="104" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="412" y="192" width="52" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.40)" stroke-width="0.8"/>
      <text x="438" y="201" fill="rgba(235,108,54,0.80)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STAGE 1</text>
      <text x="490" y="224" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Research</text>
      <text x="490" y="244" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">gather + consolidate</text>
      <text x="490" y="260" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">context from all</text>
      <text x="490" y="276" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">5 sources</text>

      <!-- Artifact: research.md -->
      <rect x="636" y="208" width="132" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="636" y="208" width="132" height="56" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="644" y="216" width="48" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.40)" stroke-width="0.8"/>
      <text x="668" y="225" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ARTIFACT</text>
      <text x="702" y="244" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">research.md</text>
      <text x="702" y="260" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">per-column analysis</text>

      <!-- Process: Enrich -->
      <rect x="404" y="420" width="172" height="104" rx="6" fill="#f5f5f5"/>
      <rect x="404" y="420" width="172" height="104" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="412" y="428" width="52" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.40)" stroke-width="0.8"/>
      <text x="438" y="437" fill="rgba(235,108,54,0.80)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STAGE 2</text>
      <text x="490" y="460" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Enrich</text>
      <text x="490" y="480" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">apply standards</text>
      <text x="490" y="496" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">@PrimaryKey, units</text>
      <text x="490" y="512" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">max 255 chars</text>

      <!-- Rules box -->
      <rect x="808" y="188" width="180" height="108" rx="6" fill="#f5f5f5"/>
      <rect x="808" y="188" width="180" height="108" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="816" y="196" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="836" y="205" fill="rgba(45,49,66,0.80)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RULES</text>
      <text x="898" y="224" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Column Standard</text>
      <text x="898" y="244" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Official terminology</text>
      <text x="898" y="260" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Key annotations</text>
      <text x="898" y="276" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Units + scale</text>
      <text x="898" y="292" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">AI search optimized</text>

      <!-- Arrow: Rules → Enrich -->
      <line x1="808" y1="280" x2="576" y2="448" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

      <!-- Output: enriched-table.ddl -->
      <rect x="636" y="420" width="180" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="636" y="420" width="180" height="56" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="644" y="428" width="48" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.40)" stroke-width="0.8"/>
      <text x="668" y="437" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OUTPUT</text>
      <text x="726" y="456" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">enriched-table.ddl</text>
      <text x="726" y="472" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">72 columns with COMMENTs</text>

      <!-- Legend -->
      <line x1="32" y1="528" x2="1008" y2="528" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="32" y="548" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <rect x="100" y="540" width="12" height="12" rx="2" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="120" y="550" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Data source</text>
      <rect x="220" y="540" width="12" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="240" y="550" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Processing stage</text>
      <rect x="380" y="540" width="12" height="12" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="400" y="550" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Artifact / output</text>
      <line x1="520" y1="546" x2="552" y2="546" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="560" y="550" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Data ingestion</text>
      <line x1="680" y1="546" x2="712" y2="546" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="720" y="550" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Transformation</text>
    </svg>
  </div>
</body>
</html>
