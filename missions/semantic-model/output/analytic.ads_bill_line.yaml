            description: MST date for first paid purchase by customer.
          - name: new_registered_user_bill_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_registered_user_bill_mst_date
            dimension:
              is_time: true
            description: MST date for new registered user bill.
          - name: federation_partner_id
            expression:
              dialects:
                - dialect: ANSI_SQL
