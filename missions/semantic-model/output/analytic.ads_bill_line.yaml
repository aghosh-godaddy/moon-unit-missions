                  expression: new_acquisition_bill_country_code
            description: Bill country for first paid purchase by customer.
          - name: new_acquisition_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_acquisition_bill_id
            description: Bill ID for first paid purchase by customer.
          - name: new_acquisition_bill_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_acquisition_bill_mst_date
