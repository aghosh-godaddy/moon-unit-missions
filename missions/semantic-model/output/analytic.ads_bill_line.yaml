version: "0.2.0.dev0"

semantic_model:
  - name: analytic_ads_bill_line
    description: >
      ADS (Analytic Data Set) layer on top of the Enterprise Fact Bill / Fact Bill Line
      entities. Provides a comprehensive bill-level transaction dataset augmented with
      Customer Type, PnL Pillar segmentation (USI, GDII, Partner, DRI, Commerce),
      Geography hierarchy, Reseller info, ISC marketing attribution, C3 Care rep
      information, Shopper lifecycle and acquisition data, Free trial and free bill
      indicators, Fraud flags, Web Pro participation, and Domain registry TLD metadata.
      Includes refunds (refund_flag=TRUE) and chargebacks (chargeback_flag=TRUE); GCR
      metrics are NULL for those rows. Replaces the legacy UDS Order / pds_order datasets.
    ai_context:
      instructions: >
        Use this model to analyze GoDaddy e-commerce billing transactions at the bill line
        (order item) level. Grain is one row per bill line item (bill_id + bill_line_num).
        Always filter on partition_bill_mst_year_month for performance. For customer counts
        use COUNT(DISTINCT bill_id) WHERE new_acquisition_flag=TRUE. Exclude refund and
        chargeback rows (refund_flag=FALSE AND chargeback_flag=FALSE) for forward revenue
        metrics. GCR metrics are NULL for refunds and chargebacks. For Web Pro orders,
        current opt-in status is reflected (not at time of order).
      synonyms:
        - bill line
        - order item
        - transaction
        - ads bill line
        - uds order
        - pds order
        - e-commerce transactions
        - GoDaddy billing data
        - receipt
        - revenue transactions
      examples:
        - "What is total GCR by product PnL category last quarter?"
        - "How many new customer acquisitions were there in the US last month?"
        - "What is revenue by reseller type and geography?"
        - "Show GCR by customer type and PnL segment for domain products"
        - "What is the YoY revenue growth by region using constant currency?"
        - "How many domain bulk purchases (>= 50 units) occurred this month?"

    datasets:

      # -----------------------------------------------------------------------
      # Fact dataset — target table populated by this PySpark job
      # -----------------------------------------------------------------------
      - name: ads_bill_line
        source: analytic.ads_bill_line
        primary_key: [bill_id, bill_line_num]
        unique_keys:
          - [bill_id, bill_line_num]
        description: >
          One row per bill line item (bill_id + bill_line_num). Augments Enterprise Fact
          Bill / Fact Bill Line with customer type, PnL pillar segmentation, geography
          hierarchy, reseller info, ISC marketing attribution, C3 care rep, shopper
          lifecycle, fraud flags, Web Pro, free trial, and domain TLD metadata.
          Partitioned by partition_bill_mst_year_month (YYYY-MM).
        ai_context:
          synonyms:
            - bill line
            - order line
            - transaction line
            - receipt line
        fields:
          # --- Identifiers & Keys ---
          - name: bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_id
            description: Unique ID for bill (order). Composite PK with bill_line_num.
          - name: bill_line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_line_num
            description: Line item number within bill. Composite PK with bill_id.
          - name: pf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: pf_id
            description: Product family ID for product purchased.
          - name: upgraded_pf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: upgraded_pf_id
            description: PF ID of product upgrading from (legacy).
          - name: original_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_bill_id
            description: For refunds/chargebacks, the original bill_id.
          - name: original_bill_line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_bill_line_num
            description: For refunds/chargebacks, original line number.
          - name: offer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: offer_id
            description: Bundle identifier for product.
          - name: offer_collection_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: offer_collection_id
            description: Parent bundle/collection identifier.
          - name: free_product_package_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: free_product_package_id
            description: Free product package ID for bill line.
          - name: rep_version_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: rep_version_id
            description: Care rep version ID on bill.
          - name: private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: private_label_id
            description: PLID for reseller/white-label partner on bill.
          - name: department_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: department_id
            description: Business department ID responsible for bill line.
          - name: accounting_company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: accounting_company_id
            description: Accounting company/subsidiary ID for legal entity.
          - name: variant_price_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: variant_price_type_id
            description: Pricing variant type ID.
          # --- Billing Geography & ISC ---
          - name: bill_country_code
