    relationships:
      - name: ads_bill_line_to_fact_bill_line_vw
        from: ads_bill_line
        to: fact_bill_line_vw
        from_columns: [bill_id, bill_line_num]
        to_columns: [bill_id, bill_line_num]

      - name: ads_bill_line_to_dim_bill_vw
        from: ads_bill_line
        to: dim_bill_vw
        from_columns: [bill_id]
        to_columns: [bill_id]

      - name: ads_bill_line_to_dim_product_snap
        from: ads_bill_line
        to: dim_product_snap
        from_columns: [pf_id]
        to_columns: [pf_id]

      - name: ads_bill_line_to_dim_geography
        from: ads_bill_line
        to: dim_geography
        from_columns: [bill_country_code]
        to_columns: [country_code]

      - name: ads_bill_line_to_dim_isc_source_code
        from: ads_bill_line
        to: dim_isc_source_code
        from_columns: [bill_isc_source_code]
        to_columns: [isc_source_code]

      - name: ads_bill_line_to_dim_reseller_vw
        from: ads_bill_line
        to: dim_reseller_vw
        from_columns: [private_label_id]
        to_columns: [private_label_id]

      - name: ads_bill_line_to_dim_customer_vw
        from: ads_bill_line
        to: dim_customer_vw
        from_columns: [merged_customer_id]
        to_columns: [customer_id]

      - name: ads_bill_line_to_customer_type_history
        from: ads_bill_line
        to: customer_type_history
        from_columns: [original_shopper_id]
        to_columns: [shopper_id]

    metrics:
      - name: total_receipt_price_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.receipt_price_usd_amt)
        description: Total amount paid for all bill lines in USD after discounts.
        ai_context:
          synonyms:
            - total revenue
            - total sales
            - receipt price
            - revenue USD

      - name: total_gcr_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.gcr_usd_amt)
        description: >
          Total Gross Cash Receipts (GCR) in USD. Excludes ICANN fees. NULL for refunds
          and chargebacks. The primary GoDaddy revenue KPI.
        ai_context:
          synonyms:
            - GCR
            - gross cash receipts
            - gross revenue
            - total GCR

