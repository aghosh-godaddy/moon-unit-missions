              "partition_filter": "partition_eval_mst_date",
              "primary_key_notes": "Composite PK (partition_eval_mst_date, shopper_id) confirmed by DQ constraint. customer_id may be null and is NOT part of the enforced PK despite @PrimaryKey annotation in lake DDL. DDL header comment lists wrong PK fields (copy-pasted from another table) — DQ constraint is authoritative."
            }
          }
