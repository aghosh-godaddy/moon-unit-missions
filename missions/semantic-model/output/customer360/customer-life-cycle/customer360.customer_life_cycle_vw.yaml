version: "0.2.0.dev0"

semantic_model:
  - name: customer360_customer_life_cycle_analytics
    description: >-
      Comprehensive daily snapshot of GoDaddy customer lifecycle states, acquisition
      metrics, and trailing twelve-month revenue analytics. Single source of truth
      (SSOT) for customer churn, reactivation, fraud, and product portfolio analysis
      across ALL customers — active and inactive. Replaces legacy datasets
      finance_cln.active_customer, finance_cln.active_customer_history,
      customer_mart.two_plus_active_customer, and related views.
    ai_context:
      instructions: >-
        GRAIN: one row per (shopper_id, partition_eval_mst_date). All facts are as of
        end of day MST for the partition date.
        PARTITION FILTER REQUIRED: always include a predicate on partition_eval_mst_date
        for every query; omitting this filter scans all historical partitions and produces
        incorrect counts.
        PRIMARY KEY CAVEATS: enforced composite PK is (partition_eval_mst_date,
        shopper_id); customer_id may be null and is NOT part of the enforced PK despite
        the @PrimaryKey annotation in the lake DDL — do not rely on customer_id alone for
        deduplication.
        ARRAY FIELDS — NOT suitable for SQL aggregation or OSI metric expressions:
        active_paid_subscription_list (scalar proxy: product_pnl_category_qty),
        product_pnl_category_list (scalar proxy: product_pnl_category_qty),
        product_pnl_line_list (approximate proxy: product_pnl_category_qty),
        ttm_all_bill_list (use ttm_gcr_usd_amt for revenue metrics),
        brand_name_list (no dedicated scalar proxy; omit from SQL aggregations).
        EXCLUDED JOIN TARGETS — use the denormalized fact columns listed instead:
        analytic_feature.customer_type_history: use customer_type_name and
        customer_type_reason_desc on the fact.
        analytic_feature.customer_fraud: use customer_fraud_flag and
        customer_fraud_mst_date (excluded from OSI datasets; composite join on PK columns
        shopper_id+customer_id with COALESCE null-handling; no dedicated FK).
        analytic_feature.shopper_merge: use customer_merge_mst_date.
        analytic_feature.shopper_acquisition: use customer_acquisition_bill_id,
        customer_acquisition_mst_date, customer_acquisition_mst_month.
        enterprise.dim_new_acquisition_shopper: use customer_acquisition_country_code,
        customer_acquisition_country_name, customer_region_1_name,
        customer_region_2_name, customer_region_3_name,
        customer_domestic_international_name.
        dp_enterprise.dim_reseller: use reseller_type_id and reseller_type_name; note
        that reseller_type_id is NOT the dim PK private_label_id and cannot be used to
        rejoin the source.
        ecomm_mart.bill_line_traffic_ext: use customer_acquisition_channel_name.
        ecomm_mart.dim_bill_line_purchase_attribution: use point_of_purchase_name.
        finance360.dim_bill_fraud_history_vw: use customer_acquisition_bill_fraud_flag.
        enterprise.dim_subscription_history: transitive via intermediate driver
        customer_active_subscription_detail_driver; use active_paid_subscription_list
        or product_pnl_category_qty.
        SUPPORTED JOINS: (1) customer_life_cycle_vw to dim_customer_history via
        shopper_id — SCD2 dimension; add current_record_flag = TRUE or filter on
        effective_start_mst_ts and effective_end_mst_ts for point-in-time correctness.
        (2) customer_life_cycle_vw to dim_country via customer_acquisition_country_code
        = country_code; add current_record_flag = TRUE.
        customer_state_enum values: active, new, churned, merged, reactivated, intraday
        (DDL comment lists only 4; code produces 6 — code is authoritative).
        ttm_gcr_usd_amt represents trailing-12-month GCR at the evaluation date, not
        current-period-only revenue.
        HISTORICAL NOTE: lake table.yaml lineage includes tables absent from the current
        PySpark code (customers.customer_id_mapping_snapshot,
        enterprise.dim_bill_shopper_id_xref, enterprise.fact_bill_line,
        enterprise.fact_entitlement_bill, ecomm_mart.entitlement_bill_type,
        finance360.dim_product_vw, finance_cln.manual_paid_subscription,
        enterprise.dim_entitlement_history) — these belong to a prior architecture and
        are not valid join targets or authoritative lineage for this table.
      synonyms:
        - customer lifecycle
        - customer life cycle
        - churn analysis
        - customer acquisition
        - active customers
        - customer state
        - TTM GCR
        - customer tenure
        - customer revenue
        - customer portfolio
      examples:
        - "How many active customers do we have today?"
        - "What is the total TTM GCR for US customers?"
        - "Show me churn rate by acquisition channel"
        - "Which customers have been with us for more than 5 years?"
        - "What percentage of customers are international?"
        - "Show average product categories per customer by region"

    datasets:
      - name: customer_life_cycle_vw
        source: customer360.customer_life_cycle_vw
        primary_key: [shopper_id, partition_eval_mst_date]
        unique_keys:
          - [shopper_id, partition_eval_mst_date]
        description: >-
          Daily point-in-time snapshot of every GoDaddy customer's lifecycle state,
          acquisition attributes, fraud indicators, product portfolio, and trailing
          twelve-month revenue. One row per (shopper_id, partition_eval_mst_date).
          All facts are as of end of day MST for the partition date.
        ai_context:
          synonyms:
            - customer lifecycle table
            - customer life cycle view
            - customer snapshot
            - customer daily snapshot
        fields:
          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: >-
              Unique numeric ID for the shopper profile used in eCommerce transactions.
              Part of the composite primary key (partition_eval_mst_date, shopper_id).

          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            description: >-
              UUID representing the customer entity across GoDaddy systems. May be null;
              NOT part of the enforced composite PK despite the @PrimaryKey annotation
              in the lake DDL — do not use customer_id alone for deduplication.

          - name: customer_acquisition_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_bill_id
            description: >-
              Bill ID that triggered first net positive status for customer. Derived from
              analytic_feature.shopper_acquisition via direct materialization; not
              directly joinable.

          - name: customer_acquisition_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_mst_date
            dimension:
              is_time: true
            description: >-
              Date of bill that triggered first net positive customer status (MST).
              Derived from analytic_feature.shopper_acquisition via direct
              materialization; not directly joinable.

          - name: customer_acquisition_mst_month
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_mst_month
            dimension:
              is_time: true
            description: >-
              Month of customer acquisition (MST), truncated to month via
              TRUNC(customer_acquisition_mst_date, 'MONTH'). Derived from
              analytic_feature.shopper_acquisition via direct materialization; not
              directly joinable.

          - name: customer_acquisition_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_country_code
            description: >-
              Country code where customer was acquired (FK to dim_country.country_code
              for enrichment lookups). Derived from enterprise.dim_new_acquisition_shopper
              via direct materialization; UK normalized to GB by PySpark transform; not
              directly joinable back to source.

          - name: customer_acquisition_channel_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_channel_name
            description: >-
              Channel through which customer was acquired. Derived from
              ecomm_mart.bill_line_traffic_ext via direct materialization (joined via
              shopper_id, which is the fact PK — no dedicated FK); not directly joinable.

          - name: customer_tenure_year_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_tenure_year_count
            description: >-
              Tenure of the customer in years. Computed in PySpark as
              CAST(DATEDIFF(partition_eval_mst_date, customer_acquisition_mst_date)
              / 365 AS INT).

          - name: customer_acquisition_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_country_name
            description: >-
              Country name where customer was acquired. Derived from
              enterprise.dim_new_acquisition_shopper via direct materialization; not
              directly joinable.

          - name: customer_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_1_name
            description: >-
              Geographic region 1 for the customer. Derived from
              enterprise.dim_new_acquisition_shopper via direct materialization; not
              directly joinable.

          - name: customer_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_2_name
            description: >-
              Geographic region 2 for the customer. Derived from
              enterprise.dim_new_acquisition_shopper via direct materialization; not
              directly joinable.

          - name: customer_region_3_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_3_name
            description: >-
              Geographic region 3 for the customer. Derived from
              enterprise.dim_new_acquisition_shopper via direct materialization; not
              directly joinable.

          - name: customer_domestic_international_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_domestic_international_name
            description: >-
              Whether customer is Domestic or International. Derived from
              enterprise.dim_new_acquisition_shopper via direct materialization; not
              directly joinable.

          - name: reseller_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_id
            description: >-
              Type ID of reseller organization. Derived from dp_enterprise.dim_reseller
              via direct materialization (via MIN(reseller_type_id) aggregation). The
              dim PK is private_label_id which is NOT stored on the fact — do not
              attempt to join to dp_enterprise.dim_reseller using this column.

          - name: reseller_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_name
            description: >-
              Name of the reseller type. Derived from dp_enterprise.dim_reseller via
              direct materialization (via MIN(reseller_type_name) aggregation); dim PK
              private_label_id not on fact — not directly joinable.

          - name: customer_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_name
            description: >-
              Customer type label at evaluation date (e.g. SMB, Enterprise, Consumer).
              Derived from analytic_feature.customer_type_history via direct
              materialization; not directly joinable.

          - name: customer_type_reason_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_reason_desc
            description: >-
              Reason for customer type classification at evaluation date. Derived from
              analytic_feature.customer_type_history via direct materialization; not
              directly joinable.

          - name: customer_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_fraud_flag
            description: >-
              True if customer is flagged as fraud at evaluation date. Derived from
              analytic_feature.customer_fraud via direct materialization; source
              excluded from OSI datasets (composite join on PK columns shopper_id +
              customer_id with COALESCE null-handling; no dedicated FK column on fact).

          - name: active_paid_subscription_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_paid_subscription_list
            description: >-
              Array of active paid subscription IDs as of the evaluation date.
              Array<string> type — NOT suitable for SQL scalar aggregation or OSI
              aggregate metrics; use product_pnl_category_qty as scalar proxy for
              subscription breadth. Derived from enterprise.dim_subscription_history
              via customer_core_conformed.customer_active_subscription_detail_driver
              (intermediate driver table); not directly joinable.

          - name: product_pnl_category_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_category_list
            description: >-
              Array of product PNL categories owned by customer as of evaluation date.
              Array<string> type — NOT suitable for SQL scalar aggregation; use
              product_pnl_category_qty as scalar proxy. Derived from
              enterprise.dim_subscription_history via
              customer_core_conformed.customer_active_subscription_detail_driver
              (intermediate driver table); not directly joinable.

          - name: product_pnl_category_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_category_qty
            description: >-
              Count of distinct product PNL categories owned by customer at evaluation
              date. Scalar proxy for active_paid_subscription_list and
              product_pnl_category_list array fields. Derived from
              enterprise.dim_subscription_history via
              customer_core_conformed.customer_active_subscription_detail_driver
              (intermediate driver table); not directly joinable.

          - name: product_pnl_line_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_line_list
            description: >-
              Array of product PNL lines owned by customer as of evaluation date.
              Array<string> type — NOT suitable for SQL scalar aggregation; use
              product_pnl_category_qty as approximate breadth proxy. Derived from
              enterprise.dim_subscription_history via
              customer_core_conformed.customer_active_subscription_detail_driver
              (intermediate driver table); not directly joinable.

          - name: ttm_all_bill_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ttm_all_bill_list
            description: >-
              Array of all bill IDs from the trailing twelve months (TTM).
              Array<string> type — NOT suitable for SQL scalar aggregation; use
              ttm_gcr_usd_amt for revenue metrics. Derived from
              customer_core_conformed.customer_ttm_payment_driver (intermediate driver
              table); not directly joinable.

          - name: brand_name_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: brand_name_list
            description: >-
              Array of all brand names associated with the customer. Array<string> type
              — NOT suitable for SQL scalar aggregation; no dedicated scalar proxy.
              Derived from enterprise.dim_subscription_history via
              customer_core_conformed.customer_active_subscription_detail_driver and
              customer_core_conformed.customer_ttm_payment_driver (intermediate driver
              tables); not directly joinable.

          - name: ttm_gcr_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ttm_gcr_usd_amt
            description: >-
              Total gross cash received (GCR) in USD over the trailing twelve months
              (TTM scalar per customer at evaluation date). Scalar proxy for the
              ttm_all_bill_list array field. Derived from
              customer_core_conformed.customer_ttm_payment_driver via SUM of
              ttm_total_gcr_usd_amt (intermediate driver table); not directly joinable.

          - name: customer_churn_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_churn_mst_date
            dimension:
              is_time: true
            description: MST date when customer most recently churned; null if not churned.

          - name: customer_reactivate_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_reactivate_mst_date
            dimension:
              is_time: true
            description: >-
              MST date when customer was most recently reactivated after churn; null if
              not reactivated.

          - name: customer_merge_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_merge_mst_date
            dimension:
              is_time: true
            description: >-
              MST date when customer account was merged into another account. Derived
              from analytic_feature.shopper_merge via direct materialization; not
              directly joinable.

          - name: customer_fraud_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_fraud_mst_date
            dimension:
              is_time: true
            description: >-
              MST date when fraud flag was set on customer. Derived from
              analytic_feature.customer_fraud via direct materialization; source
              excluded from OSI datasets (composite join on PK columns shopper_id +
              customer_id with COALESCE null-handling; no dedicated FK column on fact).

          - name: customer_state_enum
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_state_enum
            description: >-
              Customer lifecycle state as of evaluation date. Code-authoritative values:
              active, new, churned, merged, reactivated, intraday. (DDL comment lists
              only 4 values; PySpark code produces 6 — code is authoritative per source
              of truth rule.)

          - name: active_status_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_status_flag
            description: True if customer is currently active at evaluation date.

          - name: point_of_purchase_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: point_of_purchase_name
            description: >-
              Point of purchase name from the customer acquisition bill. Derived from
              ecomm_mart.dim_bill_line_purchase_attribution via direct materialization
              (ROW_NUMBER by bill_line_num DESC); the bill_id join key is not a
              standalone FK column on the fact — not directly joinable.

          - name: customer_acquisition_bill_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_bill_fraud_flag
            description: >-
              True if the acquisition bill has a fraud record in
              finance360.dim_bill_fraud_history_vw. Derived via direct materialization;
              customer_acquisition_bill_id is source data, not a FK to this dim's PK —
              not directly joinable.

          - name: etl_build_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_build_mst_ts
            dimension:
              is_time: true
            description: Timestamp when this record was built by the ETL system (MST).

          - name: partition_eval_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: partition_eval_mst_date
            dimension:
              is_time: true
            description: >-
              Partition key. All facts are as of end of this day (MST). REQUIRED filter
              for all point-in-time queries — always include a predicate on
              partition_eval_mst_date.

      - name: dim_customer_history
        source: customer360.dim_customer_history_vw
        primary_key: [customer_id]
        description: >-
          SCD2 customer history dimension tracking GoDaddy customer profile attributes
          over time. Natural key: shopper_id. Join to customer_life_cycle_vw via
          shopper_id; always add current_record_flag = TRUE or filter on
          effective_start_mst_ts/effective_end_mst_ts for point-in-time correctness.
        ai_context:
          synonyms:
            - customer history dimension
            - customer profile history
            - dim customer
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            description: Surrogate primary key for the customer history record.

          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: >-
              Natural key: unique numeric ID for shopper profile. Join key to
              customer_life_cycle_vw. Not globally unique in this SCD2 table; filter
              on current_record_flag = TRUE or use effective date range for
              point-in-time queries.

          - name: external_reseller_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: external_reseller_customer_id
            description: External reseller customer ID.

          - name: federation_partner_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: federation_partner_id
            description: >-
              Federation partner ID (FPID) scoping authorization for acquired
              brand-to-GoDaddy federation.

          - name: federation_partner_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: federation_partner_name
            description: Brand name associated with a federation partner ID.

          - name: parent_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parent_customer_id
            description: Parent customer UUID (for hierarchical accounts).

          - name: parent_shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parent_shopper_id
            description: Parent shopper ID.

          - name: private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: private_label_id
            description: Private label / reseller program identifier.

          - name: company_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_flag
            description: True if the customer account is a company (not individual).

          - name: internal_shopper_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: internal_shopper_flag
            description: True if this is an internal GoDaddy shopper account.

          - name: temporary_shopper_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: temporary_shopper_flag
            description: True if the shopper account is temporary.

          - name: closed_shopper_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: closed_shopper_flag
            description: True if the shopper account has been closed.

          - name: city_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: city_name
            description: City of the customer's registered address.

          - name: state_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: state_code
            description: State code of the customer's registered address.

          - name: zip_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: zip_code
            description: ZIP/postal code of the customer's registered address.

          - name: country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country_code
            description: Country code of the customer's registered address.

          - name: email_domain_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email_domain_name
            description: Email domain of the customer's registered email address.

          - name: email_hash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email_hash
            description: SHA hash of customer email address (PII-safe).

          - name: primary_phone_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: primary_phone_flag
            description: True if customer has a primary phone on record.

          - name: mobile_phone_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mobile_phone_flag
            description: True if customer has a mobile phone on record.

          - name: secondary_phone_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: secondary_phone_flag
            description: True if customer has a secondary phone on record.

          - name: default_currency_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: default_currency_code
            description: Customer's default billing currency code.

          - name: market_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: market_code
            description: Market code for the customer.

          - name: created_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: created_mst_ts
            dimension:
              is_time: true
            description: Timestamp when the customer account was created (MST).

          - name: updated_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: updated_mst_ts
            dimension:
              is_time: true
            description: Timestamp when the customer record was last updated (MST).

          - name: closed_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: closed_mst_ts
            dimension:
              is_time: true
            description: Timestamp when the customer account was closed (MST).

          - name: deleted_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: deleted_mst_ts
            dimension:
              is_time: true
            description: Timestamp when the customer record was deleted (MST).

          - name: effective_start_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_start_mst_ts
            dimension:
              is_time: true
            description: >-
              SCD2 effective start timestamp (MST). Use for point-in-time join to fact:
              partition_eval_mst_date BETWEEN effective_start_mst_ts AND
              effective_end_mst_ts.

          - name: effective_end_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_end_mst_ts
            dimension:
              is_time: true
            description: >-
              SCD2 effective end timestamp (MST). Use with effective_start_mst_ts for
              point-in-time join to fact.

          - name: current_record_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: current_record_flag
            description: >-
              True if this is the current (latest) SCD2 row for this shopper. Filter on
              current_record_flag = TRUE for current-state joins; use effective date
              range for historical point-in-time joins.

          - name: etl_build_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_build_mst_ts
            dimension:
              is_time: true
            description: ETL build timestamp (MST).

          - name: etl_insert_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_insert_mst_ts
            dimension:
              is_time: true
            description: ETL insert timestamp (MST).

          - name: etl_update_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_update_mst_ts
            dimension:
              is_time: true
            description: ETL update timestamp (MST).

      - name: dim_country
        source: finance360.dim_country_vw
        primary_key: [country_code]
        unique_keys:
          - [country_code]
        description: >-
          Country reference dimension providing ISO codes, regional hierarchies,
          domestic/international classification, and marketing/finance region groupings.
          Filter on current_record_flag = TRUE for current active records. Join target
          from customer_life_cycle_vw via customer_acquisition_country_code.
        ai_context:
          synonyms:
            - country dimension
            - country reference
            - geography dimension
        fields:
          - name: country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country_code
            description: >-
              Primary key. Unique identifier for a country. May include GoDaddy-specific
              non-ISO codes. Join target from customer_life_cycle_vw via
              customer_acquisition_country_code.

          - name: country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country_name
            description: Full name of the country.

          - name: iso_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_country_code
            description: ISO 3166-1 alpha-2 code (2-character).

          - name: iso_country3_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_country3_code
            description: ISO 3166-1 alpha-3 code (3-character).

          - name: iso_country_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_country_num
            description: ISO 3166-1 numeric identifier.

          - name: region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: region_name
            description: Broad region alignment (e.g. Europe, Asia).

          - name: region_sort_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: region_sort_id
            description: Region sort order identifier.

          - name: primary_language_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: primary_language_name
            description: Primary language spoken in this country.

          - name: domestic_international_ind
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: domestic_international_ind
            description: Enum — Domestic or International.

          - name: tier_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tier_num
            description: Country tier classification.

          - name: report_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_1_name
            description: Reporting region hierarchy level 1.

          - name: report_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_2_name
            description: Reporting region hierarchy level 2.

          - name: report_region_3_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_3_name
            description: Reporting region hierarchy level 3.

          - name: report_focal_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_focal_country_name
            description: Reporting region hierarchy with country/language grouping.

          - name: report_sub_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_sub_region_name
            description: Additional reporting region hierarchy grain.

          - name: legacy_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: legacy_region_name
            description: Legacy region hierarchy name.

          - name: eu_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: eu_flag
            description: True if country is part of the European Union.

          - name: active_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_flag
            description: True if the country code is currently active.

          - name: fin_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fin_region_1_name
            description: Finance region hierarchy level 1.

          - name: fin_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fin_region_2_name
            description: Finance region hierarchy level 2.

          - name: marketing_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: marketing_region_name
            description: Marketing region name.

          - name: marketing_region_group_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: marketing_region_group_name
            description: Marketing region group name.

          - name: finance_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: finance_region_name
            description: Finance region name.

          - name: row_hash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: row_hash
            description: SHA2 hash of all tracked SCD2 columns (change detection).

          - name: key_hash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: key_hash
            description: SHA2 hash of all uniquely-identifying columns.

          - name: current_record_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: current_record_flag
            description: >-
              True if this is the current active record. Required filter:
              current_record_flag = TRUE for joins from customer_life_cycle_vw.

          - name: etl_insert_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_insert_utc_ts
            dimension:
              is_time: true
            description: Timestamp when record was initially inserted (UTC).

          - name: etl_update_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_update_utc_ts
            dimension:
              is_time: true
            description: Timestamp when record was last updated (UTC).

    relationships:
      - name: customer_life_cycle_to_dim_customer_history
        from: customer_life_cycle_vw
        to: dim_customer_history
        from_columns: [shopper_id]
        to_columns: [shopper_id]
        ai_context:
          instructions: >-
            SCD2 relationship: shopper_id is the natural key (not the surrogate PK
            customer_id). For current-state queries add current_record_flag = TRUE on
            dim_customer_history. For point-in-time historical queries, filter on
            effective_start_mst_ts <= partition_eval_mst_date AND
            effective_end_mst_ts > partition_eval_mst_date.

      - name: customer_life_cycle_to_dim_country
        from: customer_life_cycle_vw
        to: dim_country
        from_columns: [customer_acquisition_country_code]
        to_columns: [country_code]
        ai_context:
          instructions: >-
            Join on customer_acquisition_country_code = country_code; add
            current_record_flag = TRUE on dim_country. Note: the PySpark job
            normalizes UK to GB in the fact before this join, so dim_country should
            contain 'GB' not 'UK'.

    metrics:
      - name: total_ttm_gcr_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(customer_life_cycle_vw.ttm_gcr_usd_amt)
        description: >-
          Total trailing twelve-month gross cash received (GCR) in USD across all
          selected customers. ttm_gcr_usd_amt is a per-customer TTM scalar derived from
          customer_core_conformed.customer_ttm_payment_driver (intermediate table).
        ai_context:
          synonyms:
            - total TTM GCR
            - trailing twelve month revenue
            - TTM gross cash received
            - total revenue TTM

      - name: active_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN customer_life_cycle_vw.active_status_flag = TRUE THEN customer_life_cycle_vw.shopper_id END)
        description: >-
          Number of distinct active customers at the evaluation date. Requires
          partition_eval_mst_date filter for point-in-time accuracy.
        ai_context:
          synonyms:
            - active customers
            - count of active customers
            - active customer base

      - name: avg_product_pnl_category_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(customer_life_cycle_vw.product_pnl_category_qty)
        description: >-
          Average number of distinct product PNL categories per customer (scalar proxy
          for product breadth). product_pnl_category_qty is derived from
          enterprise.dim_subscription_history via the customer_active_subscription_detail_driver
          intermediate table.
        ai_context:
          synonyms:
            - average product categories per customer
            - avg product breadth
            - average PNL categories

      - name: avg_customer_tenure_years
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(customer_life_cycle_vw.customer_tenure_year_count)
        description: >-
          Average customer tenure in years across all selected customers.
          customer_tenure_year_count is computed as
          CAST(DATEDIFF(partition_eval_mst_date, customer_acquisition_mst_date) / 365 AS INT).
        ai_context:
          synonyms:
            - average tenure
            - average customer age
            - avg years as customer

      - name: churned_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN customer_life_cycle_vw.customer_state_enum = 'churned' THEN customer_life_cycle_vw.shopper_id END)
        description: >-
          Number of distinct churned customers at the evaluation date. Requires
          partition_eval_mst_date filter for point-in-time accuracy.
        ai_context:
          synonyms:
            - churned customers
            - count of churned customers
            - customer churn count

    custom_extensions:
      - vendor_name: GODADDY
        data: |
          {
            "lake_table_path": "customer360/customer-life-cycle-vw",
            "pyspark_path": "customer360/customer-metrics/src/pyspark/customer_life_cycle.py",
            "dag_name": "customer-life-cycle",
            "refresh_cadence": "daily at 07:20 MST",
            "sla_delivery": "08:00 MST daily",
            "data_tier": 4,
            "partition_key": "partition_eval_mst_date",
            "domain": "customer",
            "organization": "EDT (Enterprise Data Team)",
            "pipeline_lineage": {
              "intermediate_tables": [
                {
                  "table": "customer_core_conformed.active_customer_stg",
                  "role": "staging",
                  "upstream_pyspark": "customer360/active-customer/src/pyspark/active_customer_stg.py"
                },
                {
                  "table": "customer_core_conformed.customer_ttm_payment_driver",
                  "role": "driver",
                  "upstream_pyspark": "UNRESOLVED — driver table not in lake catalog; upstream PySpark path not traced in gather stage"
                },
                {
                  "table": "customer_core_conformed.customer_active_subscription_detail_driver",
                  "role": "driver",
                  "upstream_pyspark": "UNRESOLVED — driver table not in lake catalog; upstream PySpark path not traced in gather stage"
                }
              ],
              "transitive_sources": [
                {
                  "table": "enterprise.dim_subscription_history",
                  "via": "customer_core_conformed.customer_active_subscription_detail_driver",
                  "materialized_in_fields": [
                    "active_paid_subscription_list",
                    "product_pnl_category_list",
                    "product_pnl_category_qty",
                    "product_pnl_line_list",
                    "brand_name_list"
                  ]
                }
              ],
              "materialized_direct_reads": [
                {
                  "table": "analytic_feature.customer_type_history",
                  "materialized_in_fields": ["customer_type_name", "customer_type_reason_desc"]
                },
                {
                  "table": "analytic_feature.shopper_merge",
                  "materialized_in_fields": ["customer_merge_mst_date"]
                },
                {
                  "table": "analytic_feature.shopper_acquisition",
                  "materialized_in_fields": [
                    "customer_acquisition_bill_id",
                    "customer_acquisition_mst_date",
                    "customer_acquisition_mst_month"
                  ]
                },
                {
                  "table": "enterprise.dim_new_acquisition_shopper",
                  "materialized_in_fields": [
                    "customer_acquisition_country_code",
                    "customer_acquisition_country_name",
                    "customer_region_1_name",
                    "customer_region_2_name",
                    "customer_region_3_name",
                    "customer_domestic_international_name"
                  ]
                },
                {
                  "table": "ecomm_mart.bill_line_traffic_ext",
                  "materialized_in_fields": ["customer_acquisition_channel_name"]
                },
                {
                  "table": "ecomm_mart.dim_bill_line_purchase_attribution",
                  "materialized_in_fields": ["point_of_purchase_name"]
                },
                {
                  "table": "finance360.dim_bill_fraud_history_vw",
                  "materialized_in_fields": ["customer_acquisition_bill_fraud_flag"]
                },
                {
                  "table": "dp_enterprise.dim_reseller",
                  "materialized_in_fields": ["reseller_type_id", "reseller_type_name"]
                }
              ],
              "excluded_dimensions": [
                {
                  "table": "analytic_feature.customer_fraud",
                  "reason": "no_join_key_in_fact — composite join on PK columns (shopper_id, customer_id) with COALESCE null-handling; customer_id may be null; data fully materialized onto fact",
                  "fields_on_fact": ["customer_fraud_flag", "customer_fraud_mst_date"]
                }
              ],
              "legacy_sources": [
                {
                  "path": "s3://gd-ckpetlbatch-prod-analytic/analytic/ads_bill_line_ext/",
