      - name: dim_bill_line_purchase_attribution
        source: ecomm_mart.dim_bill_line_purchase_attribution
        primary_key: [bill_id, bill_line_num]
        unique_keys:
          - [bill_id, bill_line_num]
        description: >
          Purchase attribution dimension for bill line items. Tracks point of purchase and
          purchase path per bill line. Multiple rows exist per bill_id (one per bill line number).
          Use ROW_NUMBER() OVER (PARTITION BY bill_id ORDER BY bill_line_num DESC) = 1 to obtain
          a single point-of-purchase record per bill and avoid fan-out when joining from
          customer_life_cycle.customer_acquisition_bill_id.
        ai_context:
          synonyms:
            - "purchase attribution"
            - "point of purchase"
            - "bill line attribution"
        fields:
          - name: bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_id
            description: >
              Bill identifier. Part of composite PK (bill_id, bill_line_num). FK from
              customer_life_cycle.customer_acquisition_bill_id.

          - name: bill_line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_line_num
            description: >
              Line item number within the bill. Part of composite PK. Use MAX(bill_line_num)
              or ROW_NUMBER() OVER (PARTITION BY bill_id ORDER BY bill_line_num DESC) = 1
              for deduplication to a single record per bill.

          - name: bill_modified_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_modified_mst_ts
            dimension:
              is_time: true
            description: Timestamp of the bill modification (MST).

          - name: bill_modified_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_modified_mst_date
            dimension:
              is_time: true
            description: Date of the bill modification (MST).

          - name: purchase_path_attributed_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: purchase_path_attributed_name
            description: Attributed purchase path name for this bill line.

          - name: point_of_purchase_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: point_of_purchase_name
            description: >
              Point of purchase name for this bill line. Denormalized to
              customer_life_cycle.point_of_purchase_name.

          - name: sub_point_of_purchase_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: sub_point_of_purchase_name
            description: Sub point of purchase name for this bill line.

          - name: customer_product_purchase_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_product_purchase_type_name
            description: Customer product purchase type name.

          - name: etl_build_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_build_mst_ts
            dimension:
              is_time: true
            description: ETL build timestamp (MST).

      - name: dim_bill_fraud_history
        source: finance360.dim_bill_fraud_history_vw
        primary_key: [bill_id, effective_start_mst_ts]
        unique_keys:
          - [bill_id, effective_start_mst_ts]
        description: >
          SCD2 fraud history dimension for bills. Tracks fraud flag events per bill with
          effective date ranges. Filter current_record_flag = true to get the current fraud
          record per bill, or use SELECT DISTINCT bill_id, to avoid SCD2 fan-out when joining
          from customer_life_cycle.customer_acquisition_bill_id.
        ai_context:
          synonyms:
            - "bill fraud"
            - "fraud history"
            - "fraud dimension"
        fields:
          - name: bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_id
            description: >
              Bill identifier. Part of composite SCD2 PK (bill_id, effective_start_mst_ts).
              FK from customer_life_cycle.customer_acquisition_bill_id. PySpark uses
              SELECT DISTINCT bill_id from this table before joining.

          - name: fraud_flag_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fraud_flag_mst_ts
            dimension:
              is_time: true
            description: Timestamp when the fraud flag was set on this bill (MST).

          - name: fraud_flag_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fraud_flag_mst_date
            dimension:
              is_time: true
            description: Date when the fraud flag was set on this bill (MST).

          - name: fraud_review_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fraud_review_id
            description: ID of the fraud review in which this bill was marked as fraudulent.

          - name: row_hash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: row_hash
            description: SHA2 hash of tracked columns for SCD2 change detection.

          - name: key_hash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: key_hash
            description: SHA2 hash of key columns.

          - name: effective_start_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_start_mst_ts
            dimension:
              is_time: true
            description: SCD2 effective start timestamp (MST). Part of composite PK.

          - name: effective_end_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_end_mst_ts
            dimension:
              is_time: true
            description: SCD2 effective end timestamp (MST). Null for the current record.

          - name: current_record_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: current_record_flag
            description: >
              True for the current SCD2 record for this bill_id. Filter current_record_flag =
              true to obtain a single fraud record per bill and avoid fan-out when joining
              from customer_life_cycle.

          - name: etl_insert_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_insert_utc_ts
            dimension:
              is_time: true
            description: Record insert timestamp (UTC).

          - name: etl_update_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_update_utc_ts
            dimension:
              is_time: true
            description: Record last updated timestamp (UTC).

    relationships:
      - name: life_cycle_to_shopper_acquisition
        from: customer_life_cycle
        to: shopper_acquisition
        from_columns: [shopper_id]
        to_columns: [shopper_id]

      - name: life_cycle_to_dim_country
        from: customer_life_cycle
        to: dim_country
        from_columns: [customer_acquisition_country_code]
        to_columns: [country_code]

      - name: life_cycle_to_dim_bill_line_purchase_attribution
        from: customer_life_cycle
        to: dim_bill_line_purchase_attribution
        from_columns: [customer_acquisition_bill_id]
        to_columns: [bill_id]
        ai_context: >
          FAN-OUT GUARD REQUIRED: dim_bill_line_purchase_attribution has multiple rows per
          bill_id (one per bill_line_num; composite PK is [bill_id, bill_line_num]). Always
          apply ROW_NUMBER() OVER (PARTITION BY bill_id ORDER BY bill_line_num DESC) = 1
          before joining to avoid multiplying fact rows.

      - name: life_cycle_to_dim_bill_fraud_history
        from: customer_life_cycle
        to: dim_bill_fraud_history
        from_columns: [customer_acquisition_bill_id]
        to_columns: [bill_id]
        ai_context: >
          FAN-OUT GUARD REQUIRED: dim_bill_fraud_history is an SCD2 table with multiple
          records per bill_id (composite PK is [bill_id, effective_start_mst_ts]). Filter
          current_record_flag = true, or use SELECT DISTINCT bill_id, before joining to avoid
          multiplying fact rows.

    metrics:
      - name: total_ttm_gcr_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(customer_life_cycle.ttm_gcr_usd_amt)
        description: >
          Total gross cash received (GCR) in USD across trailing twelve months for all selected
          customers. Aggregate of the ttm_gcr_usd_amt scalar field (itself derived from
          SUM(ttm_total_gcr_usd_amt) in the PySpark ETL from
          customer_core_conformed.customer_ttm_payment_driver).
        ai_context:
          synonyms:
            - "total TTM GCR"
            - "trailing twelve month revenue"
            - "total last 12 months revenue"
            - "total GCR"

      - name: active_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN customer_life_cycle.active_status_flag = true THEN customer_life_cycle.shopper_id END)
        description: >
          Number of distinct active shoppers at the evaluation date
          (active_status_flag = true). Always filter by partition_eval_mst_date before
          aggregating to target a specific snapshot date.
        ai_context:
          synonyms:
            - "number of active customers"
            - "active shopper count"
            - "active customer base"

      - name: avg_product_pnl_category_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(customer_life_cycle.product_pnl_category_qty)
        description: >
          Average number of distinct product PNL categories per customer (product breadth proxy).
          Based on product_pnl_category_qty scalar field, which is derived as
          COUNT(DISTINCT product_pnl_category) in the PySpark ETL from
          enterprise.dim_subscription_history via the
          customer_core_conformed.customer_active_subscription_detail_driver driver.
        ai_context:
          synonyms:
            - "average product breadth"
            - "average PNL category count"
            - "avg product categories"

    custom_extensions:
      - vendor_name: GODADDY
        data: |
          {
            "lake_table_path": "customer360/customer-life-cycle-vw",
            "pyspark_path": "customer360/customer-metrics/src/pyspark/customer_life_cycle.py",
            "dag_name": "customer-life-cycle",
            "refresh_cadence": "daily at 07:20 UTC (cron: 20 7 * * *)",
            "sla_delivery": "daily by 08:00 AM MST (cron: 00 15 * * ? * UTC)",
            "data_tier": 4,
            "partition_key": "partition_eval_mst_date",
            "domain": "customer",
            "organization": "DNA",
            "pipeline_lineage": {
              "intermediate_tables": [
                {
                  "table": "customer_core_conformed.active_customer_stg",
                  "role": "staging - base population of active and recently-churned customers for the eval date",
                  "upstream_pyspark": "UNRESOLVED: DAG sensor key local_process/customer_core_conformed/active_customer_stg"
                },
                {
                  "table": "customer_core_conformed.customer_ttm_payment_driver",
                  "role": "driver - pre-aggregated trailing-twelve-month payment data per (shopper_id, customer_id); source for ttm_gcr_usd_amt, ttm_all_bill_list, brand_name_list",
                  "upstream_pyspark": "UNRESOLVED: DAG sensor key local_process/customer_core_conformed/customer_ttm_payment_driver"
                },
                {
                  "table": "customer_core_conformed.customer_active_subscription_detail_driver",
                  "role": "driver - pre-filtered active subscription detail per (shopper_id, customer_id); source for active_paid_subscription_list, product_pnl_category_list, product_pnl_line_list, product_pnl_category_qty",
                  "upstream_pyspark": "UNRESOLVED: DAG sensor key local_process/customer_core_conformed/customer_active_subscription_detail_driver"
                }
              ],
              "transitive_sources": [
                {
                  "table": "enterprise.dim_subscription_history",
                  "via": "customer_core_conformed.customer_active_subscription_detail_driver",
                  "materialized_in_fields": [
                    "active_paid_subscription_list",
                    "product_pnl_category_list",
                    "product_pnl_line_list",
                    "product_pnl_category_qty"
                  ]
                }
              ],
              "materialized_direct_reads": [
                {
                  "table": "analytic_feature.customer_type_history",
                  "materialized_in_fields": [
                    "customer_type_name",
                    "customer_type_reason_desc"
                  ],
                  "join_note": "SCD2: shopper_id with date-range filter record_start_mst_date <= eval <= record_end_mst_date; cannot re-join without eval date context"
                },
                {
                  "table": "dp_enterprise.dim_reseller",
                  "materialized_in_fields": [
                    "reseller_type_id",
                    "reseller_type_name"
                  ],
                  "join_note": "FK chain: customer360.dim_customer_history_vw.private_label_id -> dp_enterprise.dim_reseller; private_label_id not on fact"
                },
                {
                  "table": "analytic_feature.shopper_merge",
                  "materialized_in_fields": [
                    "customer_merge_mst_date"
                  ],
                  "join_note": "SCD2: shopper_id with date-range filter shopper_merge_start_mst_date <= eval <= shopper_merge_end_mst_date; cannot re-join without eval date context"
                },
                {
                  "table": "ecomm_mart.bill_line_traffic_ext",
                  "materialized_in_fields": [
                    "customer_acquisition_channel_name"
                  ],
                  "join_note": "complex time-filtered acquisition bill join; includes pre-2022-08 legacy S3 path equivalent"
                },
                {
                  "table": "customer360.dim_customer_history_vw",
                  "materialized_in_fields": [],
                  "join_note": "SCD2 intermediate; provides private_label_id for dim_reseller lookup only; no columns appear directly on fact; do not join directly"
                },
                {
                  "table": "enterprise.dim_new_acquisition_shopper",
                  "materialized_in_fields": [
                    "customer_acquisition_mst_date",
                    "customer_acquisition_bill_id"
                  ],
                  "join_note": "acquisition derivation chain for new and intraday customers (PySpark joins 11 and 19)"
                }
              ],
              "legacy_sources": [
                {
                  "path": "s3://gd-ckpetlbatch-prod-analytic/analytic/ads_bill_line_ext/",
                  "equivalent": "ecomm_mart.bill_line_traffic_ext",
                  "condition": "pre-2022-08 partitions only; HARDCODED prod path in customer_life_cycle.py (code defect: not environment-parameterized unlike all other reads); policy YAML labels as analytic_local.ads_bill_line_ext (approximate)"
                }
              ]
            },
            "query_guards": {
              "grain": "one row per (shopper_id, partition_eval_mst_date)",
              "partition_filter": "partition_eval_mst_date",
              "primary_key_notes": "Composite PK (partition_eval_mst_date, shopper_id); customer_id is NOT unique alone and may be null for historical records; Hive DDL PK comment listing resource_id and product_family_name is a copy-paste error from another table - disregard; authoritative PK confirmed by DQ constraint isPrimaryKey(partition_eval_mst_date, shopper_id) on customer360.customer_life_cycle_vw"
            }
          }
