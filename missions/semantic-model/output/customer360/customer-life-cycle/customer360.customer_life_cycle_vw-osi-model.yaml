version: "0.2.0.dev0"

semantic_model:
  - name: customer360_customer_life_cycle_analytics
    description: >
      Daily snapshot model tracking the complete lifecycle journey of GoDaddy customers from
      acquisition through active, churned, reactivated, merged, and fraud states. Captures
      per-customer trailing twelve-month GCR, active subscription inventory, reseller context,
      geographic attributes, and lifecycle event dates. Primary OSI and OWL target in the
      Customer360 domain (35% domain weight). Stakeholders: Finance and Marketing (business
      stewards), DAP, FORGE. Data tier: 4. Delivered daily by 08:00 AM MST.
    ai_context:
      instructions: >
        Use this model to analyze GoDaddy customer lifecycle states, acquisition channels,
        retention/churn, trailing twelve-month revenue (TTM GCR), and active subscription
        inventory. The fact dataset is partitioned by partition_eval_mst_date — always filter
        on this column for performance. customer_state_enum enumerates six states: active,
        new, churned, reactivated, merged, intraday. For geographic analysis, join dim_country_vw
        on customer_acquisition_country_code = country_code (and filter
        current_record_flag = true). For reseller analysis, join dim_reseller on
        reseller_type_id. For customer profile details, join dim_customer_history_vw on
        customer_id (filter current_record_flag = true for current state). The
        active_paid_subscription_list column is an array — use UNNEST/LATERAL to join to
        dim_subscription_history. Do NOT use customer_core_conformed.* staging tables as
        data sources.
      synonyms:
        - "customer lifecycle"
        - "customer churn"
        - "active customers"
        - "customer acquisition"
        - "customer retention"
        - "TTM GCR"
        - "trailing twelve month revenue"
        - "customer 360"
        - "customer state"
        - "customer cohort"
        - "C360"
      examples:
        - "How many customers churned last month?"
        - "What is the average customer tenure by acquisition channel?"
        - "What is the total TTM GCR for US customers?"
        - "Show me the count of active customers by reseller type"
        - "Which acquisition channels produce the highest-tenure customers?"
        - "What percentage of customers acquired this quarter are still active?"
        - "How many customers were reactivated in Q1 2026?"
        - "What is the product P&L category mix for active customers in Europe?"

    datasets:

      # =========================================================================
      # FACT: customer_life_cycle_vw
      # =========================================================================
      - name: customer_life_cycle_vw
        source: customer360.customer_life_cycle_vw
        primary_key: [customer_id, partition_eval_mst_date]
        unique_keys:
          - [shopper_id, partition_eval_mst_date]
        description: >
          Daily partitioned snapshot of customer lifecycle state. One row per customer per
          evaluation date. Tracks lifecycle states (active, churned, reactivated, merged,
          intraday), trailing twelve-month GCR, active subscription inventory, and all
          lifecycle event dates. Analytic Dataset for Customer Life Cycle (data tier 4).
        ai_context:
          synonyms:
            - "customer lifecycle snapshot"
            - "customer state table"
            - "C360 lifecycle"
            - "customer life cycle view"
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            description: >
              Primary key (with partition_eval_mst_date): UUID representing the customer
              entity across GoDaddy systems.
            ai_context:
              synonyms: ["customer UUID", "customer identifier"]

          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: >
              Unique key (with partition_eval_mst_date): Numeric shopper profile ID used
              in eCommerce transactions.
            ai_context:
              synonyms: ["shopper identifier", "shopper number"]

          - name: customer_acquisition_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_bill_id
            description: >
              Bill ID that triggered the customer's first net positive status (acquisition
              event). Foreign key to analytic_feature.shopper_acquisition.

          - name: customer_acquisition_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_mst_date
            dimension:
              is_time: true
            description: Date of first net positive acquisition bill (MST).
            ai_context:
              synonyms: ["acquisition date", "customer start date"]

          - name: customer_acquisition_mst_month
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_mst_month
            dimension:
              is_time: true
            description: >
              Acquisition month truncated to the first day of the month
              (TRUNC(customer_acquisition_mst_date, 'MONTH')).

          - name: customer_acquisition_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_country_code
            description: >
              Country code where customer was acquired (UK normalized to GB).
              Foreign key to finance360.dim_country_vw.country_code.
            ai_context:
              synonyms: ["acquisition country", "country at acquisition"]

          - name: customer_acquisition_channel_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_channel_name
            description: Marketing or traffic channel through which the customer was acquired.
            ai_context:
              synonyms: ["acquisition channel", "channel"]

          - name: customer_tenure_year_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_tenure_year_count
            description: >
              Customer tenure in full years:
              CAST(DATEDIFF(partition_eval_mst_date, customer_acquisition_mst_date) / 365 AS INT).
            ai_context:
              synonyms: ["tenure years", "years as customer", "customer age"]

          - name: customer_acquisition_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_country_name
            description: Country name where customer was acquired.

          - name: customer_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_1_name
            description: Geographic reporting region 1 at acquisition.

          - name: customer_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_2_name
            description: Geographic reporting region 2 at acquisition.

          - name: customer_region_3_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_region_3_name
            description: Geographic reporting region 3 at acquisition.

          - name: customer_domestic_international_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_domestic_international_name
            description: Domestic vs. international indicator for customer geography.
            ai_context:
              synonyms: ["domestic international", "dom/intl"]

          - name: reseller_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_id
            description: >
              Reseller type numeric ID. Foreign key to dp_enterprise.dim_reseller.reseller_type_id.

          - name: reseller_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_name
            description: Reseller type name denormalized from dp_enterprise.dim_reseller.
            ai_context:
              synonyms: ["reseller", "reseller name"]

          - name: customer_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_name
            description: >
              Customer type label at evaluation date (e.g., SMB, Enterprise). Overridden to
              '123 Reg' for shoppers with private_label_id = 587240.
            ai_context:
              synonyms: ["customer segment", "customer type"]

          - name: customer_type_reason_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_reason_desc
            description: >
              Customer type reason description. Overridden to '123 Reg' for 123Reg shoppers.

          - name: customer_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_fraud_flag
            description: True if customer is flagged as fraud at evaluation date.
            ai_context:
              synonyms: ["fraud flag", "is fraud"]

          - name: active_paid_subscription_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_paid_subscription_list
            description: >
              Array of active, finance-payable subscription IDs (COLLECT_SET). Array foreign
              key to enterprise.dim_subscription_history.subscription_id. Requires
              UNNEST/LATERAL to join.
            ai_context:
              synonyms: ["subscription list", "active subscriptions"]

          - name: product_pnl_category_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_category_list
            description: Array of distinct product P&L categories owned by the customer (COLLECT_SET).
            ai_context:
              synonyms: ["product categories", "P&L categories"]

          - name: product_pnl_category_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_category_qty
            description: >
              Count of distinct product P&L categories across active subscriptions
              (COUNT DISTINCT product_pnl_category).
            ai_context:
              synonyms: ["product category count", "category breadth"]

          - name: product_pnl_line_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_line_list
            description: Array of product P&L lines owned by the customer (COLLECT_SET).

          - name: ttm_all_bill_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ttm_all_bill_list
            description: >
              Array of bill IDs from the trailing twelve months (TTM) associated with the
              customer (COLLECT_SET of last_net_positive_bill_id).

          - name: brand_name_list
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: brand_name_list
            description: >
              Sorted array of brand names from active subscriptions and TTM bills
              (SORT_ARRAY(ARRAY_UNION(subscription brands, TTM brands))).

          - name: ttm_gcr_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ttm_gcr_usd_amt
            description: >
              Pre-aggregated trailing twelve-month gross cash received (GCR) in USD.
              Excludes records where trxn_currency_code = 'N/A'.
            ai_context:
              synonyms: ["TTM GCR", "trailing twelve month revenue", "TTM revenue"]

          - name: customer_churn_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_churn_mst_date
            dimension:
              is_time: true
            description: >
              MST date when the customer most recently churned. Null if not churned.
              Also populated for customers in intraday status.
            ai_context:
              synonyms: ["churn date", "date churned"]

          - name: customer_reactivate_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_reactivate_mst_date
            dimension:
              is_time: true
            description: MST date when the customer was most recently reactivated after a churn.
            ai_context:
              synonyms: ["reactivation date", "win-back date"]

          - name: customer_merge_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_merge_mst_date
            dimension:
              is_time: true
            description: MST date when the customer account was merged into another account.
            ai_context:
              synonyms: ["merge date", "account merge date"]

          - name: customer_fraud_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_fraud_mst_date
            dimension:
              is_time: true
            description: MST date when the fraud flag was set on this customer.
            ai_context:
              synonyms: ["fraud date", "date flagged as fraud"]

          - name: customer_state_enum
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_state_enum
            description: >
              Customer lifecycle state at evaluation date. Enumerated values (priority order):
              intraday, merged, churned, reactivated, new, active.
            ai_context:
              synonyms: ["customer status", "lifecycle state", "customer state"]

          - name: active_status_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_status_flag
            description: >
              True if customer_state_enum NOT IN ('churned', 'intraday'). Indicates the
              customer is considered active for reporting purposes.
            ai_context:
              synonyms: ["is active", "active flag"]

          - name: point_of_purchase_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: point_of_purchase_name
            description: Point of purchase name for the acquisition bill.
            ai_context:
              synonyms: ["purchase point", "POP"]

          - name: customer_acquisition_bill_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_acquisition_bill_fraud_flag
            description: True if the acquisition bill has a record in dim_bill_fraud_history_vw.
            ai_context:
              synonyms: ["acquisition bill fraud", "bill fraud flag"]

          - name: etl_build_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_build_mst_ts
            dimension:
              is_time: true
            description: Timestamp when this record was built by the ETL process (MST).

          - name: partition_eval_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: partition_eval_mst_date
            dimension:
              is_time: true
            description: >
              PARTITION KEY: Evaluation date in YYYY-MM-DD format (MST). Always filter on
              this column to avoid full table scans.
            ai_context:
              synonyms: ["eval date", "evaluation date", "snapshot date", "partition date"]

      # =========================================================================
      # DIMENSION: shopper_acquisition
      # =========================================================================
      - name: shopper_acquisition
        source: analytic_feature.shopper_acquisition
        primary_key: [shopper_id]
        description: >
          Acquisition attributes for shoppers including acquisition bill, channel, country,
          reseller, fraud flag, and GCR at time of first net positive status.
        ai_context:
          synonyms:
            - "acquisition data"
            - "shopper acquisition"
            - "first purchase"
        fields:
          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: Primary key: shopper identifier.

          - name: evaluation_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: evaluation_mst_date
            dimension:
              is_time: true
            description: Evaluation date for this acquisition record (MST).

          - name: acq_bill_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_bill_mst_date
            dimension:
              is_time: true
            description: Date of acquisition bill (MST).

          - name: acq_bill_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_bill_mst_ts
            dimension:
              is_time: true
            description: Timestamp of acquisition bill (MST).

          - name: acq_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_bill_id
            description: Acquisition bill ID.

          - name: acq_isc_source_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_isc_source_code
            description: ISC source code at acquisition.

          - name: acq_isc_channel_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_isc_channel_name
            description: Acquisition marketing channel name.
            ai_context:
              synonyms: ["channel name", "acquisition channel"]

          - name: acq_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_country_code
            description: Country code at acquisition.

          - name: acq_reseller_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_reseller_type_name
            description: Reseller type name at acquisition.

          - name: acq_private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_private_label_id
            description: Private label ID at acquisition.

          - name: acq_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_fraud_flag
            description: Fraud flag on acquisition bill or shopper.

          - name: acq_gcr_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_gcr_usd_amt
            description: Gross cash received (GCR) in USD at acquisition.

          - name: acq_product_list_price_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_product_list_price_usd_amt
            description: Product list price in USD at acquisition.

          - name: acq_point_of_purchase_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_point_of_purchase_name
            description: Point of purchase name at acquisition.

          - name: acq_viral_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_viral_flag
            description: Viral acquisition indicator.

          - name: acq_product_names
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: acq_product_names
            description: Product names at acquisition.

          - name: load_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: load_date
            dimension:
              is_time: true
            description: ETL load date for this record.

      # =========================================================================
      # DIMENSION: dim_reseller
      # =========================================================================
      - name: dim_reseller
        source: dp_enterprise.dim_reseller
        primary_key: [private_label_id]
        description: >
          Reseller dimension providing reseller type, name, and geographic attributes
          keyed by private label ID.
        ai_context:
          synonyms:
            - "reseller data"
            - "private label"
            - "reseller dimension"
        fields:
          - name: private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: private_label_id
            description: Primary key: reseller private label ID.

          - name: reseller_shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_shopper_id
            description: Reseller's own shopper ID.

          - name: reseller_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_id
            description: >
              Reseller type numeric ID. Join key from customer_life_cycle_vw.reseller_type_id.

          - name: reseller_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_type_name
            description: Reseller type name.

          - name: reseller_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_name
            description: Full reseller name.

          - name: reseller_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_country_code
            description: Reseller country code.

          - name: reseller_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_country_name
            description: Reseller country name.

          - name: reseller_domestic_international_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_domestic_international_name
            description: Domestic or international indicator for the reseller.

          - name: reseller_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_region_1_name
            description: Reseller geographic region 1.

          - name: reseller_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_region_2_name
            description: Reseller geographic region 2.

      # =========================================================================
      # DIMENSION: dim_country_vw
      # =========================================================================
      - name: dim_country_vw
        source: finance360.dim_country_vw
        primary_key: [country_code]
        description: >
          Country dimension providing geographic hierarchy, region groupings, and
          finance/marketing attributes. Some codes are GoDaddy-specific (not strict ISO).
          Filter current_record_flag = true for current records.
        ai_context:
          synonyms:
            - "country data"
            - "geography"
            - "geo dimension"
            - "country dimension"
        fields:
          - name: country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country_code
            description: >
              Primary key: country code. Some non-ISO GoDaddy-specific codes present;
              UK normalized to GB in the fact table.

          - name: country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country_name
            description: Country name.

          - name: iso_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_country_code
            description: ISO 2-character country code.

          - name: iso_country3_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_country3_code
            description: ISO 3-character country code.

          - name: region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: region_name
            description: High-level region name (e.g., Europe, Asia).

          - name: domestic_international_ind
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: domestic_international_ind
            description: Domestic or international indicator.

          - name: report_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_1_name
            description: Reporting region hierarchy level 1.

          - name: report_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_2_name
            description: Reporting region hierarchy level 2.

          - name: report_region_3_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_region_3_name
            description: Reporting region hierarchy level 3.

          - name: report_focal_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: report_focal_country_name
            description: Reporting country or language grouping.

          - name: fin_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fin_region_1_name
            description: Finance region hierarchy level 1.

          - name: fin_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fin_region_2_name
            description: Finance region hierarchy level 2.

          - name: marketing_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: marketing_region_name
            description: Marketing region name.

          - name: marketing_region_group_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: marketing_region_group_name
            description: Marketing region group name.

          - name: finance_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: finance_region_name
            description: Finance-specific region name.

          - name: eu_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: eu_flag
            description: True if country is an EU member.

          - name: active_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: active_flag
            description: True if this country code is currently active.

          - name: current_record_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: current_record_flag
            description: >
              SCD2 current record flag. Filter current_record_flag = true for current rows.
              Required when joining from customer_life_cycle_vw.

          - name: etl_insert_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_insert_utc_ts
            dimension:
              is_time: true
            description: ETL insert timestamp (UTC).

          - name: etl_update_utc_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_update_utc_ts
            dimension:
              is_time: true
            description: ETL update timestamp (UTC).

      # =========================================================================
      # DIMENSION: dim_customer_history_vw
      # =========================================================================
      - name: dim_customer_history_vw
        source: customer360.dim_customer_history_vw
        primary_key: [customer_id, effective_start_mst_ts]
        description: >
          SCD2 customer profile dimension providing identity, geography, company attributes,
          and private label ID keyed by customer UUID and SCD2 effective start timestamp.
          Filter current_record_flag = true for the current customer state.
        ai_context:
          synonyms:
            - "customer profile"
            - "customer history"
            - "dim customer"
            - "customer details"
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            description: SCD2 primary key (with effective_start_mst_ts): Customer UUID.

          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: Shopper numeric ID associated with this customer.

          - name: external_reseller_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: external_reseller_customer_id
            description: External reseller customer ID.

          - name: federation_partner_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: federation_partner_id
            description: Federation partner ID (FPID) for brand-to-GoDaddy federation.

          - name: federation_partner_name
