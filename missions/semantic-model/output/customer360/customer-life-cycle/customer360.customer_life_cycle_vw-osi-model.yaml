      # =========================================================================
      # DIMENSION: dim_subscription_history
      # =========================================================================
      - name: dim_subscription_history
        source: enterprise.dim_subscription_history
        primary_key: [subscription_id]
        description: >
          Subscription history dimension capturing product type, lifecycle status, billing
          dates, and originating bill for each subscription. Joined from
          customer_life_cycle_vw.active_paid_subscription_list (array) via UNNEST/LATERAL.
        ai_context:
          synonyms:
            - "subscription data"
            - "subscription history"
            - "product subscriptions"
            - "dim subscription"
        fields:
          - name: subscription_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_id
            description: Primary key: native subscription identifier.
            ai_context:
              synonyms: ["subscription identifier", "subscription ID"]

          - name: resource_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: resource_id
            description: Legacy CES resource identifier.

          - name: product_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_type_id
            description: Product type numeric ID.

          - name: product_type_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_type_desc
            description: >
              Product type description (e.g., Domain Registration, Web Hosting).
            ai_context:
              synonyms: ["product type", "product"]

          - name: product_family_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_family_name
            description: Product family grouping name.
            ai_context:
              synonyms: ["product family", "product group"]

          - name: shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: shopper_id
            description: Shopper ID owning the subscription.

          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            description: Customer UUID. Foreign key to customer360.dim_customer_history_vw.

          - name: original_bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_bill_id
            description: Originating purchase bill ID.

          - name: subscription_status_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_status_id
            description: Subscription lifecycle status numeric code.

          - name: subscription_status_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_status_name
            description: >
              Subscription lifecycle status name (e.g., active, cancelled, expired).
            ai_context:
              synonyms: ["subscription status", "status"]

          - name: subscription_sub_status_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_sub_status_name
            description: Granular sub-status name within the subscription lifecycle.

          - name: subscription_bill_due_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_bill_due_mst_ts
            dimension:
              is_time: true
            description: Next billing due date timestamp (MST).

          - name: subscription_bill_due_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_bill_due_mst_date
            dimension:
              is_time: true
            description: Next billing due date (MST).

          - name: subscription_paid_through_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscription_paid_through_mst_date
            dimension:
              is_time: true
            description: Paid-through date (end of active billing period, MST).

          - name: auto_renewal_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: auto_renewal_flag
            description: True if auto-renewal is configured for the subscription.

          - name: subscription_cancel_mst_date
