    # ==========================================================================
    # RELATIONSHIPS
    # ==========================================================================
    relationships:
      - name: customer_life_cycle_to_shopper_acquisition
        from: customer_life_cycle_vw
        to: shopper_acquisition
        from_columns: [shopper_id]
        to_columns: [shopper_id]
        ai_context: >
          Joins customer lifecycle records to shopper acquisition attributes.
          PySpark join: ac.shopper_id = acq.shopper_id (LEFT JOIN).
          Lake DDL annotation: @ForeignKey (analytic_feature.shopper_acquisition) on
          customer_acquisition_bill_id.

      - name: customer_life_cycle_to_dim_reseller
        from: customer_life_cycle_vw
        to: dim_reseller
        from_columns: [reseller_type_id]
        to_columns: [reseller_type_id]
        ai_context: >
          Joins customer lifecycle records to reseller attributes via reseller_type_id.
          Lake DDL annotation: @ForeignKey (dp_enterprise.dim_reseller) on reseller_type_id.
          ETL uses BROADCAST hint. Note: dim_reseller primary key is private_label_id; this
          join uses reseller_type_id as a non-unique lookup key.

      - name: customer_life_cycle_to_dim_country_vw
        from: customer_life_cycle_vw
        to: dim_country_vw
        from_columns: [customer_acquisition_country_code]
        to_columns: [country_code]
        ai_context: >
          Joins customer lifecycle records to country and geographic hierarchy attributes.
          PySpark join: acq.bill_country_code = geo.country_code AND
          geo.current_record_flag = true (BROADCAST hint).
          Always filter dim_country_vw.current_record_flag = true when joining.

      - name: customer_life_cycle_to_dim_customer_history_vw
        from: customer_life_cycle_vw
        to: dim_customer_history_vw
        from_columns: [customer_id]
        to_columns: [customer_id]
        ai_context: >
          Joins customer lifecycle records to the SCD2 customer profile dimension.
          dim_customer_history_vw PK is (customer_id, effective_start_mst_ts).
          Always filter dim_customer_history_vw.current_record_flag = true to retrieve
          the current customer profile version.

      - name: customer_life_cycle_to_dim_subscription_history
        from: customer_life_cycle_vw
        to: dim_subscription_history
        from_columns: [active_paid_subscription_list]
        to_columns: [subscription_id]
        ai_context: >
          ARRAY FK: active_paid_subscription_list is an array<string> column; a standard
          scalar join is not possible. Use UNNEST/LATERAL to explode the array:
          CROSS JOIN UNNEST(customer_life_cycle_vw.active_paid_subscription_list) AS t(sub_id)
          JOIN enterprise.dim_subscription_history ON t.sub_id = subscription_id.
          Lake DDL annotation: @ForeignKey (enterprise.dim_subscription_history) on
          active_paid_subscription_list.

    # ==========================================================================
    # METRICS
    # ==========================================================================
    metrics:
      - name: total_ttm_gcr_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(customer_life_cycle_vw.ttm_gcr_usd_amt)
        description: >
          Total trailing twelve-month gross cash received (GCR) in USD across all customers.
          The ttm_gcr_usd_amt column already excludes records with trxn_currency_code = 'N/A'.
        ai_context:
          synonyms:
            - "TTM GCR"
            - "total TTM revenue"
            - "trailing twelve month revenue"
            - "total GCR"

      - name: active_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: "COUNT(DISTINCT CASE WHEN customer_life_cycle_vw.active_status_flag = TRUE THEN customer_life_cycle_vw.customer_id END)"
        description: >
          Number of distinct active customers at a given evaluation date.
          Active means customer_state_enum NOT IN ('churned', 'intraday').
        ai_context:
          synonyms:
            - "active customers"
            - "number of active customers"
            - "active customer base"

      - name: churned_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: "COUNT(DISTINCT CASE WHEN customer_life_cycle_vw.customer_state_enum = 'churned' THEN customer_life_cycle_vw.customer_id END)"
        description: >
          Number of customers with churned lifecycle state at evaluation date.
          Churn occurs when a customer transitions from paid to free trial or a service lapses.
        ai_context:
          synonyms:
            - "churned customers"
            - "number of churns"
            - "churn count"

      - name: avg_customer_tenure_years
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(customer_life_cycle_vw.customer_tenure_year_count)
        description: >
          Average customer tenure in full years across all customers at evaluation date.
          Based on CAST(DATEDIFF(eval_date, acquisition_date) / 365 AS INT).
        ai_context:
          synonyms:
            - "average tenure"
            - "mean tenure"
            - "average customer age"

      - name: unique_customer_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT customer_life_cycle_vw.customer_id)
        description: >
          Total distinct customers in the snapshot for a given evaluation date.
          Includes all lifecycle states (active, churned, merged, reactivated, intraday).
        ai_context:
          synonyms:
            - "total customers"
            - "customer count"
            - "number of customers"

    # ==========================================================================
    # CUSTOM EXTENSIONS
    # ==========================================================================
    custom_extensions:
      - vendor_name: GODADDY
        data: '{"lake_table_path": "customer360/customer-life-cycle-vw", "pyspark_path": "customer360/customer-metrics/src/pyspark/customer_life_cycle.py", "dag_name": "customer-life-cycle", "refresh_cadence": "daily at 07:20 MST, delivery by 08:00 MST"}'
