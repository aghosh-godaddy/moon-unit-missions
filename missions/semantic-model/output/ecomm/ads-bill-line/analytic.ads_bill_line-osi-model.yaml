    relationships:
      - name: bill_line_to_bill
        from: ads_bill_line
        to: dim_bill
        from_columns: [bill_id]
        to_columns: [bill_id]

      - name: bill_line_to_product
        from: ads_bill_line
        to: dim_product
        from_columns: [pf_id]
        to_columns: [pf_id]

      - name: bill_line_to_customer
        from: ads_bill_line
        to: dim_customer
        from_columns: [original_customer_id]
        to_columns: [customer_id]

      - name: bill_line_to_reseller
        from: ads_bill_line
        to: dim_reseller
        from_columns: [private_label_id]
        to_columns: [private_label_id]

      - name: bill_line_to_gcr_logic
        from: ads_bill_line
        to: customer_type_gcr_logic
        from_columns: [customer_type_name, product_pnl_new_renewal_name, product_pnl_category_name, product_pnl_line_name, product_pnl_version_name, product_pnl_subline_name, bill_report_region_2_name]
        to_columns: [customer_type_name, product_pnl_new_renewal_name, product_pnl_category_name, product_pnl_line_name, product_pnl_version_name, product_pnl_subline_name, order_region_2_name]

      - name: bill_line_to_free_entitlement
        from: ads_bill_line
        to: free_entitlement
        from_columns: [bill_id, bill_line_num]
        to_columns: [paid_bill_id, paid_bill_line_num]

      - name: bill_line_to_c3_attribution
        from: ads_bill_line
        to: c3_rev_attribution
        from_columns: [bill_id]
        to_columns: [order_id]

    metrics:
      - name: total_gcr_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.gcr_usd_amt)
        description: Total Gross Cash Receipts in USD. NULL for refunds and chargebacks.
        ai_context:
          synonyms:
            - total GCR
            - gross cash receipts
            - total revenue USD

      - name: total_gcr_constant_currency
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.gcr_constant_currency_amt)
        description: Total GCR using constant FX rate to enable YoY trending without currency fluctuations.
        ai_context:
          synonyms:
            - constant currency GCR
            - CC GCR
            - YoY GCR

      - name: total_receipt_price_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.receipt_price_usd_amt)
        description: Total amount paid (USD) after discounts across bill lines.
        ai_context:
          synonyms:
            - total RPA
            - total receipt price
            - total amount paid

      - name: total_fair_market_value_usd
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.fair_market_value_usd_amt)
        description: Total fair market value in USD for revenue recognition.
        ai_context:
          synonyms:
            - total FMV
            - total fair market value

      - name: total_unit_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.unit_qty)
        description: Total number of units purchased.
        ai_context:
          synonyms:
            - total units
            - unit count

      - name: total_product_month_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.product_month_qty)
        description: Total calendar months of subscription purchased.
        ai_context:
          synonyms:
            - total subscription months
            - months purchased

      - name: distinct_order_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT ads_bill_line.bill_id)
        description: Number of unique orders/bills.
        ai_context:
          synonyms:
            - order count
            - number of orders
            - bill count

      - name: new_acquisition_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN ads_bill_line.new_acquisition_flag = TRUE THEN ads_bill_line.bill_id END)
        description: Count of unique bills representing new customer acquisitions (first paid purchase).
        ai_context:
          synonyms:
            - new acquisitions
            - new customers
