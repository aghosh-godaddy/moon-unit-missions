version: "0.2.0.dev0"

semantic_model:
  - name: analytic_ads_bill_line
    description: >
      Analytic Data Set (ADS) Bill Line — the analytic layer over GoDaddy eCommerce billing data
      providing one row per bill line item (product) per order/receipt. Replaces legacy uds_order
      and pds_order with updated taxonomy, incorporating core Enterprise Fact Bill / Fact Bill Line
      entities enriched with product, customer, geography, fraud, CRM, and marketing attribution
      dimensions. Includes refunds and chargebacks; GCR metrics are NULL for these. Partitioned by
      partition_bill_mst_year_month (YYYY-MM); daily refresh by 7:00 AM MST.
    ai_context:
      instructions: >
        Use this model for analyzing GoDaddy eCommerce billing and revenue data at the order
        line-item level. Each row represents one product (bill_line_num) on one order/receipt
        (bill_id). Refunds and chargebacks are included — filter using refund_flag and
        chargeback_flag. GCR metrics (gcr_usd_amt, gcr_constant_currency_amt) are NULL for
        refunds and chargebacks. When counting new customer acquisitions, use
        COUNT(DISTINCT bill_id) WHERE new_acquisition_flag = TRUE. For Web Pro orders,
        web_pro_participant_type_name reflects the shopper's current opt-in status, not
        status at time of order.
      synonyms:
        - bill line
        - order line
        - receipt line
        - uds_order
        - pds_order
        - bill_line
        - ADS bill line
        - analytic bill line
        - ecomm transactions
        - order transactions
      examples:
        - "What is the total GCR by product PnL category last month?"
        - "How many new customer acquisitions in Q4?"
        - "Show revenue by geographic region and reseller type."
        - "What is the renewal rate by product line?"
        - "Which customers have Web Pro orders?"
        - "What is the total receipt price for domain registrations by country?"
        - "Show GCR constant currency trend by year-month."
        - "How many orders came through Care (C3) vs. Web?"

    datasets:
      - name: ads_bill_line
        source: analytic.ads_bill_line
        primary_key: [bill_id, bill_line_num]
        unique_keys:
          - [bill_id, bill_line_num]
        description: >
          Primary fact table. One row per line item (product) per order/receipt. Grain confirmed
          by DQ constraint isPrimaryKey(bill_id, bill_line_num). Partitioned by
          partition_bill_mst_year_month. Full overwrite per partition on daily schedule.
        ai_context:
          synonyms:
            - bill line fact
            - order line fact
            - ecomm billing fact
        fields:
          - name: bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_id
            description: PK. Unique ID for bill (order/receipt)
            ai_context:
              synonyms: [order_id, receipt_id, order id]

          - name: bill_line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_line_num
            description: PK. Line item number within bill (0 = header level)
            ai_context:
              synonyms: [row_id, line number, bill line number]

          - name: bill_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_country_code
            description: ISO country code from payment instrument

          - name: rep_version_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: rep_version_id
            description: Care rep version ID on bill

          - name: private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: private_label_id
            description: ID for private label (reseller/white-label) partner
            ai_context:
              synonyms: [PLID, plid]

          - name: bill_isc_source_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_isc_source_code
            description: ISC code attributing bill to marketing campaign/email/affiliate/channel

          - name: bill_sub_geo_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_sub_geo_code
            description: Sub-geography code for payment address

          - name: bill_postal_code
