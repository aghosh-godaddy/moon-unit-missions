            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: chargeback_flag
            description: True if this is a chargeback transaction (bill_id prefix C).

          - name: virtual_bill_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: virtual_bill_flag
            description: True if this is a virtual bill (no payment exchanged).

          - name: new_acquisition_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_acquisition_flag
            description: >
              True if this bill represents the customer's first paid purchase. May be true
              on two records for shoppers with account merges. Derived from
              ecomm_core_conformed.dim_customer_registration_acquisition via
              shopper_dedup_cte; not directly joinable.
            ai_context:
              synonyms:
                - new customer flag
                - first purchase flag
                - new acq flag

          - name: new_registered_user_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_registered_user_flag
            description: >
              True when the customer initially registered with GoDaddy. Derived from
              ecomm_core_conformed.dim_customer_registration_acquisition via
              shopper_dedup_cte; not directly joinable.

          - name: bill_fraud_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_fraud_flag
            description: >
              True if the bill has been flagged as fraudulent. Derived from
              fraud_cln.fraud_note_cln and fraud_cln.fraud_review_history_cln via
              bill_id→order_id join; not directly joinable.

          - name: bill_fraud_flag_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_fraud_flag_ts
            dimension:
              is_time: true
            description: >
              Timestamp when the bill was flagged as fraudulent. Derived from
              fraud_cln.fraud_note_cln; not directly joinable.

          - name: bill_fraud_flag_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_fraud_flag_date
            dimension:
              is_time: true
            description: >
              Date when the bill was flagged as fraudulent. Derived from
              fraud_cln.fraud_note_cln; not directly joinable.

          - name: bill_fraud_review_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_fraud_review_id
            description: >
              Fraud review ID associated with this bill. Derived from
              fraud_cln.fraud_note_cln and fraud_cln.fraud_review_history_cln; not directly
              joinable.

          - name: domain_bulk_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: domain_bulk_flag
            description: >
              True if the total non-refund domain registration units on the bill are >= 50.
              Computed via window SUM over bill_id.

          - name: free_bill_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: free_bill_flag
            description: True if the entire bill has no GCR (no revenue on any line).

          - name: free_bill_line_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: free_bill_line_flag
            description: >
              True for a non-virtual bill line where receipt_price_usd_amt = 0 and
              gcr_usd_amt = 0.

          - name: free_bill_line_with_fair_market_value_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: free_bill_line_with_fair_market_value_flag
            description: >
              True for a non-virtual bill line where receipt_price_usd_amt = 0 but
              gcr_usd_amt > 0 (product has fair market value but no cash exchanged).

          - name: product_free_trial_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_free_trial_flag
            description: >
              True for bills that initiated a free trial. Derived from
              enterprise.free_entitlement; not directly joinable.

          - name: product_free_trial_conversion_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_free_trial_conversion_flag
            description: >
              True if the customer converted from a free trial to a paid subscription.
              Derived from enterprise.free_entitlement; not directly joinable.

          - name: product_free_term_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_free_term_flag
            description: True for products that are free for the first billing period.

          - name: accounting_deferred_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: accounting_deferred_flag
            description: True if the revenue on this bill line is deferred for accounting.

          - name: primary_product_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: primary_product_flag
            description: True for primary products (not add-ons or supplemental products).

          - name: renewal_price_locked_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: renewal_price_locked_flag
            description: True if the renewal price is locked for this product.

          - name: units_as_bills_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: units_as_bills_flag
            description: >
              True if this purchase is for exactly 1 resource regardless of unit quantity
              (units-as-bills product type).

          # ── ETL Metadata ──
          - name: etl_build_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: etl_build_mst_ts
            dimension:
              is_time: true
            description: MST timestamp when this record was last updated by the ETL process.

          - name: source_process_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: source_process_name
            description: Name of the ETL process that created or last updated this record.

          # ── Partition ──
          - name: partition_bill_mst_year_month
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: partition_bill_mst_year_month
            dimension:
              is_time: true
            description: >
              Partition key in YYYY-MM format representing the bill MST year-month. Always
              include this column in WHERE clause filters to avoid full-table scans.
            ai_context:
              synonyms:
                - partition key
                - year month partition
                - bill month


