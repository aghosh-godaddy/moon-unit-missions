    # ──────────────────────────────────────────────────────────────
    # RELATIONSHIPS
    # ──────────────────────────────────────────────────────────────
    relationships:
      - name: ads_bill_line_to_fact_bill_line_vw
        from: ads_bill_line
        to: fact_bill_line_vw
        from_columns: [bill_id, bill_line_num]
        to_columns: [bill_id, bill_line_num]
        ai_context:
          instructions: >
            ads_bill_line is derived from fact_bill_line_vw (ecomm360 EDS). Both share
            the same grain (bill_id + bill_line_num). Use ads_bill_line for analytics;
            join to fact_bill_line_vw only when accessing raw EDS-specific attributes
            not surfaced on the analytic fact.

      - name: ads_bill_line_to_dim_bill_vw
        from: ads_bill_line
        to: dim_bill_vw
        from_columns: [bill_id]
        to_columns: [bill_id]
        ai_context:
          instructions: >
            ads_bill_line joins to dim_bill_vw via bill_id to resolve bill-level attributes.
            Most bill attributes are already materialized onto ads_bill_line.

      - name: ads_bill_line_to_dim_product_snap
        from: ads_bill_line
        to: dim_product_snap
        from_columns: [pf_id]
        to_columns: [pf_id]
        ai_context:
          instructions: >
            Join on pf_id to access additional product catalog attributes not materialized
            onto ads_bill_line. bigreporting.dim_product_hist_cln is a conditional alternate
            (same semantic role; activated by --dim-product-table flag; not a separate OSI
            dataset).

      - name: ads_bill_line_to_dim_isc_source_code
        from: ads_bill_line
        to: dim_isc_source_code
        from_columns: [bill_isc_source_code]
        to_columns: [isc_source_code]
        ai_context:
          instructions: >
            Note: ads_bill_line.bill_isc_source_code maps to dim_isc_source_code.isc_source_code
            (column name differs). Most ISC attributes are already materialized onto
            ads_bill_line as bill_isc_* columns.

      - name: ads_bill_line_to_dim_reseller_vw
        from: ads_bill_line
        to: dim_reseller_vw
        from_columns: [private_label_id]
        to_columns: [private_label_id]
        ai_context:
          instructions: >
            Join on private_label_id to access reseller attributes. Most reseller attributes
            are already materialized onto ads_bill_line. customer360.dim_customer_vw and
            finance360.dim_country_vw are reached only transitively through dim_reseller_vw;
            do not attempt to join those tables directly from ads_bill_line.

      - name: ads_bill_line_to_employee_master_snap_v3
        from: ads_bill_line
        to: employee_master_snap_v3
        from_columns: [rep_version_id]
        to_columns: [rep_version_id]
        ai_context:
          instructions: >
            Join on rep_version_id to access Care rep attributes not materialized onto
            ads_bill_line. Note: C3 attribution attributes (c3_rep_name,
            c3_rep_supervisor_name, etc.) are derived from callcenterreporting sources,
            not from employee_master_snap_v3 directly.

    # ──────────────────────────────────────────────────────────────
    # METRICS
    # ──────────────────────────────────────────────────────────────
    metrics:
      - name: total_gcr_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.gcr_usd_amt)
        description: >
          Total Gross Cash Receipts in USD. Primary revenue metric. Note: gcr_usd_amt
          is NULL for refund and chargeback transactions; use refund_flag=false AND
          chargeback_flag=false to restrict to positive-revenue transactions.
        ai_context:
          synonyms:
            - total GCR
            - total gross cash receipts
            - total revenue
            - revenue

      - name: total_receipt_price_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.receipt_price_usd_amt)
        description: Total amount paid in USD after all discounts across all bill lines.
        ai_context:
          synonyms:
            - total receipt price
            - total paid amount
            - total billed amount

      - name: total_gcr_constant_currency_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.gcr_constant_currency_amt)
        description: >
          Total GCR using a constant FX rate for year-over-year comparisons. Derived from
          dp_stage.ref_order_constant_currency (materialized onto fact).
        ai_context:
          synonyms:
            - constant currency GCR
            - constant currency revenue
            - YoY comparable revenue

      - name: total_margin_gcr_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.margin_gcr_usd_amt)
        description: Total GCR margin in USD after cost of goods sold (COGS).
        ai_context:
          synonyms:
            - total margin
            - total GCR margin
            - gross margin

      - name: bill_line_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: >
          Total number of bill lines. Grain is one row per (bill_id, bill_line_num).
          Uniqueness enforced by DQ constraint.
        ai_context:
          synonyms:
            - count of transactions
            - number of bill lines
            - transaction count

      - name: new_acquisition_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: "COUNT(DISTINCT CASE WHEN ads_bill_line.new_acquisition_flag = TRUE THEN ads_bill_line.bill_id END)"
        description: >
          Count of distinct new customer acquisition bills (new_acquisition_flag=true).
          Uses DISTINCT bill_id because shoppers with account merges may have two records
          with new_acquisition_flag=true for the same acquisition event.
        ai_context:
          synonyms:
            - new customer count
            - new acquisition count
            - new customer acquisitions

      - name: total_unit_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.unit_qty)
        description: Total units purchased across all bill lines.
        ai_context:
          synonyms:
            - total units
            - unit volume
            - units sold

      - name: total_tax_usd_amt
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ads_bill_line.tax_usd_amt)
        description: Total tax charged in USD across all bill lines.
        ai_context:
          synonyms:
            - total tax
            - tax collected

