version: "0.2.0.dev0"

semantic_model:
  - name: analytic_ads_bill_line
    description: >
      Analytic Data Set (ADS) for eCommerce bill lines. Augments the core Enterprise Data
      Store (EDS) Fact Bill / Fact Bill Line entities (ecomm360 layer) with pre-joined
      dimensions including Customer Type, Finance PnL hierarchy, Geography,
      Reseller/Partner info, ISC/Marketing attribution, Care (C3) attribution, fraud flags,
      and Web Pro indicators. One row per bill line (bill_id + bill_line_num). Replaces the
      legacy UDS Order. Refreshed daily by 7:00 AM MST. Tier 2 data product owned by the
      Emerald Data Team (eComm domain).
    ai_context:
      instructions: >
        Use this model to analyze eCommerce transactions at the bill line level.
        GRAIN: one row per (bill_id, bill_line_num).
        REQUIRED PARTITION FILTER: always filter on partition_bill_mst_year_month (YYYY-MM)
        to control scan size; omitting this filter causes full-table scans.
        PRIMARY KEY CAVEATS: Composite PK (bill_id, bill_line_num); bill_id has prefix R for
        refunds, C for chargebacks; uniqueness enforced by DQ constraint in ads_bill_line.json.
        REVENUE GUIDANCE: Use gcr_usd_amt as the primary revenue metric; GCR is NULL for
        refund (refund_flag=true) and chargeback (chargeback_flag=true) transactions.
        Use gcr_constant_currency_amt for year-over-year constant-currency comparisons.
        ACQUISITION COUNTS: new_acquisition_flag may be true on two records for shoppers with
        account merges; use COUNT(DISTINCT bill_id) WHERE new_acquisition_flag=true for correct
        new customer counts.
        NO ARRAY FIELDS: this table contains no array-type columns; all upstream arrays have
        been flattened or aggregated during ETL.
        EXCLUDED JOIN TARGETS (use denormalized fact columns instead):
        customer360.dim_customer_vw is not joinable from ads_bill_line — use reseller_shopper_id
        on the fact;
        customer360.dim_customer_history_vw is not joinable — it was used for shopper dedup
        only, use original_shopper_id and merged_shopper_id on the fact;
        finance360.dim_country_vw is not in the lake catalog — use reseller_country_code and
        reseller_country_name on the fact;
        ecomm_core_conformed.dim_customer_registration_acquisition is an Iceberg S3 table not
        in the lake catalog — use new_acquisition_flag, new_acquisition_bill_id, and related
        columns on the fact;
        reference_cln.tld_registry_reference_cln is not directly joinable — use
        domain_back_end_registry_name and related domain columns on the fact.
        REDSHIFT ARTIFACTS (do not reference as lake datasets):
        ecomm_prod.ads_bill_line is a Redshift copy of this table;
        dna_approved.bill_line and dna_approved.uds_order are Redshift materialized views
        downstream of this table — they are not lake tables.
      synonyms:
        - ADS bill line
        - ads_bill_line
        - analytic bill line
        - ecommerce orders
        - ecomm transactions
        - UDS order replacement
        - bill line analytics
        - order revenue
        - bill line detail
        - ecomm bill line
      examples:
        - What is total GCR by product PnL category last month?
        - Show new customer acquisition count by region this year
        - What is the revenue breakdown by reseller type?
        - How many domain purchases had bulk pricing last quarter?
        - What is the Care rep attribution rate for US customers?
        - Show YoY constant currency revenue by market region
        - What is the average receipt price for renewal vs new products?

    datasets:

      # ──────────────────────────────────────────────────────────────
      # FACT: analytic.ads_bill_line
      # ──────────────────────────────────────────────────────────────
      - name: ads_bill_line
        source: analytic.ads_bill_line
        primary_key: [bill_id, bill_line_num]
        unique_keys:
          - [bill_id, bill_line_num]
        description: >
          One row per bill line (bill_id + bill_line_num). Central eCommerce analytic fact
          table covering all billing transactions including new orders, renewals, refunds,
          and chargebacks. Combines ecomm360 EDS fact/dim bill views with pre-joined and
          denormalized attributes from 20+ upstream sources.
        ai_context:
          synonyms:
            - bill line
            - order line
            - transaction
            - purchase record
        fields:

          # ── Identity / Keys ──
          - name: bill_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_id
            description: >
              Unique identifier for the bill. Prefix R indicates a refund transaction;
              prefix C indicates a chargeback. Composite PK with bill_line_num.

          - name: bill_line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_line_num
            description: Line number within the bill. Composite PK with bill_id.

          - name: pf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: pf_id
            description: >
              Product family ID. Foreign key to dim_product_snap.pf_id and
              dim_product_hist_cln.pf_id (conditional alternate; same semantic role).
            ai_context:
              synonyms:
                - product family id
                - product id

          - name: original_shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_shopper_id
            description: >
              Shopper ID at the time the bill was originally created. Derived from
              customers.customer_id_mapping_snapshot via multiple ID-resolution joins.
              Also resolved via customer360.dim_customer_history_vw (filter and dedup only;
              that table is not directly joinable from ads_bill_line).

          - name: merged_shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: merged_shopper_id
            description: >
              Current post-merge shopper ID. Derived from customers.customer_id_mapping_snapshot
              via ID-resolution joins. Also resolved via customer360.dim_customer_history_vw
              (filter and dedup only; that table is not directly joinable from ads_bill_line).

          - name: original_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_customer_id
            description: >
              Customer ID at the time the bill was originally created. Derived from
              customers.customer_id_mapping_snapshot; not directly joinable.

          - name: merged_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: merged_customer_id
            description: >
              Current post-merge customer ID. Derived from customers.customer_id_mapping_snapshot;
              not directly joinable.

          - name: subaccount_shopper_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subaccount_shopper_id
            description: >
              Shopper ID for the subaccount associated with the bill. Derived from
              customers.customer_id_mapping_snapshot; not directly joinable.

          - name: rep_version_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: rep_version_id
            description: Care rep version ID on the bill. Foreign key to employee_master_snap_v3.

          - name: bill_isc_source_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_isc_source_code
            description: >
              Internal/internet source code identifying the marketing attribution for the bill.
              Foreign key to dim_isc_source_code.isc_source_code.
            ai_context:
              synonyms:
                - ISC
                - isc source code
                - marketing source code

          - name: private_label_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: private_label_id
            description: >
              ID for the private label (reseller) partner associated with the bill.
              Foreign key to dim_reseller_vw.private_label_id.

          # ── Bill Attributes ──
          - name: bill_modified_mst_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_modified_mst_date
            dimension:
              is_time: true
            description: MST date of bill creation or last modification.

          - name: bill_modified_mst_ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_modified_mst_ts
            dimension:
              is_time: true
            description: MST timestamp of bill creation or last modification.

          - name: bill_country_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_country_code
            description: >
              ISO country code of the payment instrument billing address. Join key to
              dm_reference.dim_geography (geography attributes fully materialized onto fact).

          - name: bill_source_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_source_name
            description: Point-of-sale channel or purchase origin name.

          - name: entered_by_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: entered_by_name
            description: Entity or role that submitted the bill.

          - name: source_system_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: source_system_name
            description: Name of the originating system for the bill.

          - name: trxn_currency_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: trxn_currency_code
            description: >
              ISO 4217 currency code for the transaction. Join key to
              dp_stage.ref_order_constant_currency (constant currency amounts fully
              materialized onto fact).

          - name: translation_language_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: translation_language_name
            description: Language of the customer's browser at purchase time.

          - name: bill_sub_geo_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_sub_geo_code
            description: Sub-geography code for the payment instrument billing address.

          - name: bill_postal_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_postal_code
            description: Postal code for the payment instrument billing address.

          - name: bill_site_language_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_site_language_code
            description: Language locale code of the website at purchase time.

          # ── Financial Amounts ──
          - name: receipt_price_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: receipt_price_usd_amt
            description: Amount paid in USD after all discounts. Primary receipt revenue metric.

          - name: receipt_price_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: receipt_price_trxn_amt
            description: Amount paid in the transaction currency after all discounts.

          - name: receipt_price_constant_currency_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: receipt_price_constant_currency_amt
            description: >
              Amount paid using a constant FX rate for year-over-year comparisons. Derived
              from dp_stage.ref_order_constant_currency via trxn_currency_code join; not
              directly joinable.

          - name: receipt_regular_price_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: receipt_regular_price_usd_amt
            description: Current standard selling price in USD (pre-discount list price).

          - name: receipt_regular_price_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: receipt_regular_price_trxn_amt
            description: Current standard selling price in the transaction currency.

          - name: gcr_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: gcr_usd_amt
            description: >
              Gross Cash Receipts in USD. Primary revenue metric. NULL for refund and
              chargeback transactions (refund_flag=true or chargeback_flag=true).
            ai_context:
              synonyms:
                - GCR
                - gross cash receipts
                - revenue

          - name: gcr_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: gcr_trxn_amt
            description: >
              Gross Cash Receipts in the transaction currency. NULL for refund and chargeback
              transactions.

          - name: gcr_constant_currency_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: gcr_constant_currency_amt
            description: >
              GCR using a constant FX rate for year-over-year comparisons. Derived from
              dp_stage.ref_order_constant_currency via trxn_currency_code join; not directly
              joinable.
            ai_context:
              synonyms:
                - constant currency GCR
                - constant currency revenue

          - name: margin_gcr_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: margin_gcr_usd_amt
            description: GCR margin in USD after cost of goods sold (COGS).

          - name: margin_gcr_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: margin_gcr_trxn_amt
            description: GCR margin in the transaction currency after COGS.

          - name: msrp_total_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: msrp_total_usd_amt
            description: Full manufacturer suggested retail (list) price in USD.

          - name: msrp_total_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: msrp_total_trxn_amt
            description: Full list price in the transaction currency.

          - name: msrp_duration_unit_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: msrp_duration_unit_usd_amt
            description: List price per billing-period unit in USD.

          - name: msrp_duration_unit_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: msrp_duration_unit_trxn_amt
            description: List price per billing-period unit in the transaction currency.

          - name: fair_market_value_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fair_market_value_usd_amt
            description: Fair market value in USD.

          - name: fair_market_value_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fair_market_value_trxn_amt
            description: Fair market value in the transaction currency.

          - name: tax_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tax_usd_amt
            description: Tax charged in USD.

          - name: tax_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tax_trxn_amt
            description: Tax charged in the transaction currency.

          - name: commission_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: commission_usd_amt
            description: Commission owed to a third party in USD.

          - name: commission_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: commission_trxn_amt
            description: Commission owed to a third party in the transaction currency.

          - name: aftermarket_seller_commission_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aftermarket_seller_commission_usd_amt
            description: >
              Commission paid to a domain aftermarket seller in USD. Derived from
              dp_stage.ref_commission_products via pf_id join; not directly joinable.

          - name: aftermarket_seller_commission_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aftermarket_seller_commission_trxn_amt
            description: >
              Commission paid to a domain aftermarket seller in the transaction currency.
              Derived from dp_stage.ref_commission_products via pf_id join; not directly
              joinable.

          - name: cost_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cost_usd_amt
            description: Cost of goods sold (COGS) in USD.

          - name: cost_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cost_trxn_amt
            description: Cost of goods sold in the transaction currency.

          - name: fee_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fee_usd_amt
            description: Fee in USD (typically ICANN registration fee for domain products).

          - name: fee_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fee_trxn_amt
            description: Fee in the transaction currency.

          - name: injected_fair_market_value_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_fair_market_value_usd_amt
            description: System-injected fair market value adjustment in USD.

          - name: injected_fair_market_value_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_fair_market_value_trxn_amt
            description: System-injected fair market value adjustment in the transaction currency.

          - name: injected_icann_fee_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_icann_fee_usd_amt
            description: System-injected ICANN fee in USD.

          - name: injected_icann_fee_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_icann_fee_trxn_amt
            description: System-injected ICANN fee in the transaction currency.

          - name: injected_tax_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_tax_usd_amt
            description: System-injected tax adjustment in USD.

          - name: injected_tax_trxn_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: injected_tax_trxn_amt
            description: System-injected tax adjustment in the transaction currency.

          - name: bundle_allocated_revenue_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bundle_allocated_revenue_usd_amt
            description: Revenue allocated to this line within a bundled offer in USD.

          - name: reseller_commission_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_commission_usd_amt
            description: Commission earned by the reseller in USD.

          - name: parent_reseller_commission_usd_amt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parent_reseller_commission_usd_amt
            description: Commission earned by the parent reseller in USD.

          # ── Product / PnL ──
          - name: product_pnl_group_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_group_name
            description: 1st level Finance PnL hierarchy group name.

          - name: product_pnl_category_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_category_name
            description: 2nd level Finance PnL hierarchy category name.

          - name: product_pnl_line_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_line_name
            description: 3rd level Finance PnL hierarchy line name.

          - name: product_pnl_subline_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_subline_name
            description: 4th level Finance PnL hierarchy sub-line name.

          - name: product_pnl_version_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_version_name
            description: Flexible pseudo-level of the PnL hierarchy (version designation).

          - name: product_pnl_new_renewal_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_pnl_new_renewal_name
            description: New or renewal designation for the product within the PnL hierarchy.

          - name: original_product_pnl_new_renewal_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_product_pnl_new_renewal_name
            description: Original new or renewal designation for the product (pre-override).

          - name: pnl_new_renewal
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: pnl_new_renewal
            description: New or renewal designation (legacy field; prefer product_pnl_new_renewal_name).

          - name: product_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_name
            description: Product name for the purchased product.

          - name: product_type_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_type_desc
            description: Product type description.

          - name: product_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_type_id
            description: Product type ID.

          - name: product_term_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_term_num
            description: Number of billing periods purchased.

          - name: product_term_unit_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_term_unit_desc
            description: Billing period unit description (month, quarter, year).

          - name: unit_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: unit_qty
            description: Number of units purchased on this bill line.

          - name: product_unit_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_unit_qty
            description: Unit quantity adjusted for units-as-orders products.

          - name: duration_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: duration_qty
            description: Subscription period in billing units (decimal).

          - name: product_month_qty
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_month_qty
            description: Number of calendar months in the subscription period.

          - name: upgraded_pf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: upgraded_pf_id
            description: Product family ID of the product being upgraded from (legacy field).

          - name: offer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: offer_id
            description: ID for the bundle or offer in which this product was included.

          - name: offer_collection_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: offer_collection_id
            description: ID for the parent offer collection.

          - name: free_product_package_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: free_product_package_id
            description: ID for the free product package associated with this bill line.

          - name: variant_price_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: variant_price_type_id
            description: Variant price type ID.

          - name: variant_price_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: variant_price_type_name
            description: Variant price type name.

          # ── Geography ──
          - name: bill_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_country_name
            description: >
              Country name corresponding to bill_country_code. Derived from
              dm_reference.dim_geography via broadcast left join on bill_country_code;
              not directly joinable.

          - name: bill_report_region_1_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_report_region_1_name
            description: >
              1st-level geographic reporting region. Derived from dm_reference.dim_geography
              via bill_country_code; not directly joinable.

          - name: bill_report_region_2_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_report_region_2_name
            description: >
              2nd-level geographic reporting region. Derived from dm_reference.dim_geography
              via bill_country_code; not directly joinable.

          - name: bill_report_region_3_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_report_region_3_name
            description: >
              3rd-level geographic reporting region. Derived from dm_reference.dim_geography
              via bill_country_code; not directly joinable.

          - name: bill_report_focal_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_report_focal_country_name
            description: >
              Focal country name for geographic reporting. Derived from
              dm_reference.dim_geography via bill_country_code; not directly joinable.

          - name: bill_report_sub_region_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_report_sub_region_name
            description: >
              Sub-region name for geographic reporting. Derived from
              dm_reference.dim_geography via bill_country_code; not directly joinable.

          - name: bill_domestic_international_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_domestic_international_name
            description: >
              Domestic or International classification of the bill country. Derived from
              dm_reference.dim_geography via bill_country_code; not directly joinable.

          # ── Customer Type / PnL Segments ──
          - name: customer_type_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_name
            description: >
              Customer type assigned at bill time (e.g., Independent, Partner, DRI, Commerce).
              Derived from analytic_feature.customer_type_history via shopper_id join;
              not directly joinable. Note: code references analytic_feature.customer_type
              but lake lineage resolves to customer_type_history.
            ai_context:
              synonyms:
                - customer segment
                - customer classification

          - name: customer_type_reason_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type_reason_desc
            description: >
              Description of the reason for the customer type assignment. Derived from
