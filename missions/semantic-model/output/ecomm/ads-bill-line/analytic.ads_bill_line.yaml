              Country code of the first paid reseller bill. Derived from
              finance360.dim_country_vw via partner360.dim_reseller_vw (transitive);
              finance360.dim_country_vw is not in the lake catalog and not directly
              joinable — use this column instead.

          - name: reseller_country_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: reseller_country_name
            description: >
              Country name of the first paid reseller bill. Derived from
              finance360.dim_country_vw via partner360.dim_reseller_vw (transitive);
              finance360.dim_country_vw is not in the lake catalog and not directly
              joinable — use this column instead.

